<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufacturer Directory - Final</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>

<style>
body { font-family: Arial; margin:0; padding:20px; }
#tabs { display:flex; gap:5px; margin-bottom:20px; }
.tab-btn { padding:10px; border:none; background:#eee; cursor:pointer; }
.tab-btn.active { background:#007bff; color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
#map { height:500px; }

form { max-width:500px; margin:auto; }
input, select, button {
width:100%; padding:10px; margin:10px 0;
}

button { background:#007bff; color:white; border:none; }

table { width:100%; border-collapse:collapse; margin-top:20px; }
td, th { border:1px solid #ddd; padding:8px; }

.success { color:green; }
.error { color:red; }
</style>
</head>

<body>

<h2>🏭 Manufacturer Directory</h2>

<div id="tabs">
<button class="tab-btn active" data-tab="register">Register</button>
<button class="tab-btn" data-tab="mapTab">Map</button>
<button class="tab-btn" data-tab="admin">Admin</button>
</div>

<!-- REGISTER -->
<div id="register" class="tab-content active">
<form id="regForm">
<input type="text" id="name" placeholder="Name" required>
<input type="text" id="desc" placeholder="Description" required>
<input type="text" id="Mob no" placeholder="Mob no" required>
<select id="category">
<option value="">Select Category</option>
<option>Electronics</option>
<option>Food</option>
<option>Textiles</option>
</select>

<input type="text" id="customCat" placeholder="Custom Category">

<button type="button" id="getLoc">📍 Detect Location</button>

<input type="number" id="latInput" placeholder="Latitude" required>
<input type="number" id="lngInput" placeholder="Longitude" required>

<button type="submit">Register</button>
</form>

<div id="status"></div>
</div>

<!-- MAP -->
<div id="mapTab" class="tab-content">
<div id="map"></div>
<div id="mapStatus"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab-content">

<input type="password" id="adminPass" placeholder="Password">
<button id="loginAdmin">Login</button>
<div id="adminStatus"></div>

<div id="adminContent" style="display:none;">

<div>Total: <span id="totalCount"></span></div>

<table id="adminTable">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Category</th><th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

<script>

let manufacturers = JSON.parse(localStorage.getItem('manufacturers') || '[]');
let map, markers;
let adminLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';

/* Tabs */
document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.onclick = ()=>{
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));

btn.classList.add('active');
document.getElementById(btn.dataset.tab).classList.add('active');

if(btn.dataset.tab === 'mapTab' && !map){
initMap();
loadMarkers();
}
}
});

/* Map */
function initMap(){
map = L.map('map').setView([26.8467,80.9462],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

markers = L.markerClusterGroup();
map.addLayer(markers);
}

function loadMarkers(){
markers.clearLayers();

manufacturers.forEach(m=>{
let marker = L.marker([m.lat,m.lng]);
marker.bindPopup(`<b>${m.name}</b><br>${m.category}`);
markers.addLayer(marker);
});

document.getElementById('mapStatus').textContent =
manufacturers.length + " manufacturers";

if(manufacturers.length>0){
map.fitBounds(markers.getBounds());
}
}

/* Location */
document.getElementById('getLoc').onclick = ()=>{
navigator.geolocation.getCurrentPosition(pos=>{
latInput.value = pos.coords.latitude;
lngInput.value = pos.coords.longitude;
});
};

/* Register */
regForm.onsubmit = e=>{
e.preventDefault();

let category = customCat.value || categorySelect();

function categorySelect(){
return document.getElementById('category').value;
}

if(!category) return alert("Category required");

let m = {
name:name.value,
desc:desc.value,
category:category,
lat:parseFloat(latInput.value),
lng:parseFloat(lngInput.value)
};

manufacturers.push(m);
localStorage.setItem('manufacturers', JSON.stringify(manufacturers));

regForm.reset();
status.innerHTML = "<span class='success'>Saved!</span>";

loadMarkers();
updateAdminTable();
};

/* Admin */
loginAdmin.onclick = ()=>{
if(adminPass.value === "admin123"){
adminContent.style.display = "block";
adminStatus.textContent = "Logged in";
localStorage.setItem('adminLoggedIn','true');
updateAdminTable();
}else{
adminStatus.textContent = "Wrong password";
}
};

if(adminLoggedIn){
adminContent.style.display = "block";
updateAdminTable();
}

function updateAdminTable(){
let tbody = document.querySelector('#adminTable tbody');
tbody.innerHTML = "";

manufacturers.forEach((m,i)=>{
tbody.innerHTML += `
<tr>
<td>${i}</td>
<td>${m.name}</td>
<td>${m.category}</td>
<td>
<button onclick="editItem(${i})">Edit</button>
<button onclick="deleteItem(${i})">Delete</button>
</td>
</tr>`;
});

totalCount.textContent = manufacturers.length;
}

function deleteItem(i){
manufacturers.splice(i,1);
localStorage.setItem('manufacturers', JSON.stringify(manufacturers));
updateAdminTable();
loadMarkers();
}

function editItem(i){
let m = manufacturers[i];

name.value = m.name;
desc.value = m.desc;
category.value = m.category;
latInput.value = m.lat;
lngInput.value = m.lng;

manufacturers.splice(i,1);
localStorage.setItem('manufacturers', JSON.stringify(manufacturers));

updateAdminTable();
loadMarkers();
}

</script>

</body>
</html>
