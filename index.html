<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="gradient-bg min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-lg px-6 py-3 rounded-full mb-6">
                <i class="fas fa-robot text-2xl text-yellow-400"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-white">AI Data Extractor</h1>
            </div>
            <p class="text-xl text-white/80 max-w-2xl mx-auto">
                Extract emails, phones, addresses, names, URLs from any text or webpage instantly
            </p>
        </div>

        <!-- Main App -->
        <div class="grid md:grid-cols-2 gap-8 items-start">
            <!-- Input Section -->
            <div class="glass rounded-3xl p-8 border border-white/20">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fas fa-file-alt text-2xl text-blue-400"></i>
                    <h2 class="text-2xl font-semibold text-white">Input Data</h2>
                </div>
                
                <div class="space-y-4 mb-6">
                    <textarea 
                        id="inputText" 
                        rows="8" 
                        placeholder="Paste text here or enter URL below..."
                        class="w-full p-6 rounded-2xl bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-vertical text-lg"
                    ></textarea>
                    
                    <div class="flex gap-3">
                        <input 
                            id="urlInput" 
                            type="url" 
                            placeholder="Or enter webpage URL..."
                            class="flex-1 p-4 rounded-xl bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400"
                        >
                        <button onclick="fetchUrl()" class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-8 py-4 rounded-xl font-semibold transition-all duration-300 flex items-center gap-2">
                            <i class="fas fa-download"></i> Fetch
                        </button>
                    </div>
                </div>
                
                <button onclick="extractData()" 
                        class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white py-5 px-8 rounded-2xl font-semibold text-lg transition-all duration-300 flex items-center justify-center gap-3 shadow-2xl hover:shadow-3xl hover:scale-[1.02] transform">
                    <i class="fas fa-magic text-xl"></i>
                    <span id="extractBtnText">Extract Data with AI</span>
                </button>
            </div>

            <!-- Results Section -->
            <div class="glass rounded-3xl p-8 border border-white/20">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fas fa-chart-bar text-2xl text-green-400"></i>
                    <h2 class="text-2xl font-semibold text-white">Extracted Data</h2>
                </div>
                
                <div id="results" class="space-y-4 min-h-[400px]"></div>
                
                <div class="mt-8 p-4 bg-white/10 rounded-xl border border-white/20">
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-white/70">Copy all results:</span>
                        <button onclick="copyAll()" class="text-blue-400 hover:text-blue-300 flex items-center gap-1 transition-colors">
                            <i class="fas fa-copy"></i> Copy All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Copy Success -->
        <div id="copyToast" class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-4 rounded-xl shadow-2xl hidden flex items-center gap-3 animate-bounce">
            <i class="fas fa-check"></i>
            <span>Copied to clipboard!</span>
        </div>
    </div>

    <script>
        // Free AI API (no key needed)
        const API_URL = 'https://api.openai-proxy.replit.dev/v1/chat/completions';
        
        async function extractData() {
            const input = document.getElementById('inputText').value.trim();
            if (!input) {
                alert('Please enter text or URL first!');
                return;
            }

            const btn = document.getElementById('extractBtnText');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Extracting...';
            
            try {
                const prompt = `Extract ALL of the following from this text:
1. Email addresses
2. Phone numbers (all formats)
3. Full names
4. Street addresses
5. URLs / websites
6. Social media handles (@username)
7. Company names

Format as clean bullet points with categories. Only return extracted data, no explanations.

TEXT: "${input}"`;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer pk-free-key'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 2000,
                        temperature: 0.1
                    })
                });

                const data = await response.json();
                const results = data.choices[0].message.content;
                
                displayResults(results);
            } catch (error) {
                displayResults('Error: Could not extract data. Try again or check your input.');
            } finally {
                btn.innerHTML = '<i class="fas fa-magic"></i> Extract Data Again';
            }
        }

        function displayResults(content) {
            document.getElementById('results').innerHTML = `
                <div class="bg-gradient-to-r from-green-500/20 to-blue-500/20 border border-green-400/50 p-6 rounded-2xl">
                    <pre class="whitespace-pre-wrap text-white/90 text-sm font-mono">${content}</pre>
                </div>
            `;
        }

        async function fetchUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                const html = data.contents;
                
                // Extract main text content
                const text = html.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
                document.getElementById('inputText').value = text.substring(0, 5000);
            } catch (error) {
                alert('Could not fetch URL. Please paste text manually.');
            }
        }

        function copyAll() {
            const results = document.getElementById('results').textContent;
            navigator.clipboard.writeText(results).then(() => {
                const toast = document.getElementById('copyToast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 3000);
            });
        }

        // Auto-resize textarea
        document.getElementById('inputText').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Enter to extract
        document.getElementById('inputText').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') extractData();
        });
    </script>
</body>
</html>
