<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack - World Class Logistics Platform</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .logo { font-size: 28px; font-weight: 700; color: #667eea; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .role-badge { 
            padding: 8px 16px; 
            border-radius: 25px; 
            font-weight: 600; 
            font-size: 12px;
            color: white;
        }
        .manufacturer { background: #28a745; }
        .transporter { background: #007bff; }
        .shopkeeper { background: #ffc107; color: #000; }
        .admin { background: #dc3545; }

        /* Dashboard Grid */
        .dashboard { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .main-content { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .sidebar { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); height: fit-content; }

        /* Cards */
        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }
        .card h3 { color: #333; margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-item { text-align: center; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 15px; }
        .stat-number { font-size: 32px; font-weight: 700; color: #667eea; }
        .stat-label { color: #666; font-size: 14px; margin-top: 5px; }

        /* Map */
        #map { height: 400px; border-radius: 15px; margin-bottom: 20px; }
        .location-info { display: flex; gap: 15px; align-items: center; padding: 15px; background: #f8f9ff; border-radius: 10px; }
        .location-info i { color: #667eea; font-size: 20px; }

        /* Orders Table */
        .orders-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .orders-table th, .orders-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .orders-table th { background: #f8f9ff; font-weight: 600; color: #333; }
        .status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.accepted { background: #d1ecf1; color: #0c5460; }
        .status.in-transit { background: #d4edda; color: #155724; }
        .status.delivered { background: #c3e6cb; color: #155724; }

        /* Forms */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 10px; 
            font-size: 16px; transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn { 
            padding: 15px 30px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); color: white; }

        /* Navigation */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .nav-tab { 
            padding: 15px 25px; 
            border: none; 
            background: #f8f9ff; 
            border-radius: 10px 10px 0 0; 
            cursor: pointer; 
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .nav-tab.active { background: white; border-bottom: 3px solid #667eea; color: #667eea; }

        /* Live Tracking */
        .live-tracking { position: relative; }
        .tracking-dot { 
            position: absolute; 
            width: 20px; 
            height: 20px; 
            background: #ff4757; 
            border-radius: 50%; 
            border: 4px solid white; 
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0.7; } }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .orders-table { font-size: 14px; }
            .orders-table th, .orders-table td { padding: 10px 5px; }
        }

        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            max-width: 500px; 
            width: 90%; 
            max-height: 90vh; 
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-truck"></i> LogiTrack
            </div>
            <div class="user-info">
                <div id="userRole" class="role-badge"></div>
                <span id="userName"></span>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="dashboard">
            <!-- Main Content -->
            <div class="main-content">
                <!-- Navigation Tabs -->
                <div class="nav-tabs">
                    <button class="nav-tab active" onclick="showTab('dashboard')">Dashboard</button>
                    <button class="nav-tab" onclick="showTab('orders')">Orders</button>
                    <button class="nav-tab" id="productsTab" style="display:none" onclick="showTab('products')">Products</button>
                    <button class="nav-tab" id="createOrderTab" style="display:none" onclick="showTab('createOrder')">Create Order</button>
                </div>

                <!-- Dashboard Tab -->
                <div id="dashboardTab" class="tab-content active">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number" id="totalOrders">0</div>
                            <div class="stat-label">Total Orders</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="pendingOrders">0</div>
                            <div class="stat-label">Pending</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="inTransitOrders">0</div>
                            <div class="stat-label">In Transit</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="deliveredOrders">0</div>
                            <div class="stat-label">Delivered</div>
                        </div>
                    </div>

                    <!-- Live Map -->
                    <div class="card">
                        <h3><i class="fas fa-map-marked-alt"></i> Live Tracking</h3>
                        <div id="map"></div>
                        <div class="location-info">
                            <i class="fas fa-map-pin"></i>
                            <span id="currentLocation">Loading location...</span>
                        </div>
                    </div>
                </div>

                <!-- Orders Tab -->
                <div id="ordersTab" class="tab-content">
                    <div class="card">
                        <h3><i class="fas fa-list"></i> Orders</h3>
                        <table class="orders-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Total</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Products Tab -->
                <div id="productsTabContent" class="tab-content">
                    <div class="card">
                        <h3><i class="fas fa-box"></i> Products</h3>
                        <button class="btn btn-primary" onclick="showModal('productModal')">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                        <div id="productsList" style="margin-top: 20px;"></div>
                    </div>
                </div>

                <!-- Create Order Tab -->
                <div id="createOrderTabContent" class="tab-content">
                    <div class="card">
                        <h3><i class="fas fa-shopping-cart"></i> Create New Order</h3>
                        <form id="orderForm">
                            <div class="form-group">
                                <label>Products</label>
                                <select id="productSelect" class="form-group" multiple>
                                    <!-- Products will be loaded here -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" id="quantity" min="1" value="1">
                            </div>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-paper-plane"></i> Place Order
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="card">
                    <h3><i class="fas fa-phone"></i> Quick Contacts</h3>
                    <div id="contactsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="loginPhone" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="showRegisterModal()" style="width: 48%; margin-right: 4%;">
                    Register as Manufacturer
                </button>
                <button class="btn btn-success" onclick="showRegisterModal('transporter')" style="width: 48%;">
                    Register as Transporter
                </button>
                <br><br>
                <button class="btn btn-warning" onclick="showRegisterModal('shopkeeper')" style="width: 48%; margin-right: 4%;">
                    Register as Shopkeeper
                </button>
            </div>
        </div>
    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-plus"></i> Add Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="productStock" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Add Product
                </button>
            </form>
        </div>
    </div>

    <script>
        // Global variables
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let map, userMarker, trackingMarker;
        let watchId;

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            if (token && currentUser.role) {
                initApp();
            } else {
                showModal('loginModal');
            }
        });

        async function initApp() {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
            document.getElementById('userRole').className = `role-badge ${currentUser.role}`;
            
            // Show relevant tabs
            if (currentUser.role === 'admin' || currentUser.role === 'manufacturer') {
                document.getElementById('productsTab').style.display = 'block';
            }
            if (currentUser.role === 'shopkeeper') {
                document.getElementById('createOrderTab').style.display = 'block';
            }

            initMap();
            loadDashboard();
            loadOrders();
            if (currentUser.role === 'shopkeeper') loadProductsForOrder();
            startLocationTracking();
        }

        function initMap() {
            map = L.map('map').setView([28.6139, 77.2090], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add user marker
            if (currentUser.location?.coordinates) {
                const [lng, lat] = currentUser.location.coordinates;
                userMarker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b>${currentUser.name}</b><br>Your Location`);
                map.setView([lat, lng], 15);
            }
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await res.json();
                
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
                document.getElementById('inTransitOrders').textContent = orders.filter(o => o.status === 'in-transit').length;
                document.getElementById('deliveredOrders').textContent = orders.filter(o => o.status === 'delivered').length;

                // Update map with active orders
                orders.filter(o => o.status === 'in-transit').forEach(order => {
                    if (order.currentLocation?.coordinates) {
                        const [lng, lat] = order.currentLocation.coordinates;
                        if (trackingMarker) map.removeLayer(trackingMarker);
                        trackingMarker = L.circleMarker([lat, lng], {
                            radius: 12,
                            fillColor: '#ff4757',
                            color: '#fff',
                            weight: 3,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map)
                        .bindPopup(`Order #${order._id.slice(-6)}<br>In Transit`);
                    }
                });
            } catch (error) {
                console.error('Dashboard load error:', error);
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch('/api/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await res.json();
                const tbody = document.getElementById('ordersTableBody');
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>${order._id.slice(-6)}</td>
                        <td>${order.shopkeeper?.name || 'N/A'}<br><small>${order.shopkeeper?.phone}</small></td>
                        <td><span class="status ${order.status}">${order.status.toUpperCase()}</span></td>
                        <td>₹${order.totalAmount}</td>
                        <td>
                            ${order.status === 'pending' && currentUser.role === 'manufacturer' ? 
                                `<button class="btn btn-success" onclick="acceptOrder('${order._id}')">Accept</button>` : ''}
                            ${order.status === 'accepted' && !order.transporter && currentUser.role === 'transporter' ? 
                                `<button class="btn btn-primary" onclick="pickupOrder('${order._id}')">Pickup</button>` : ''}
                            ${order.status === 'in-transit' && currentUser.role === 'transporter' ? 
                                `<button class="btn btn-success" onclick="markDelivered('${order._id}')">Delivered</button>` : ''}
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Orders load error:', error);
            }
        }

        async function loadProductsForOrder() {
            try {
                const res = await fetch('/api/products', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await res.json();
                const select = document.getElementById('productSelect');
                select.innerHTML = products.map(p => 
                    `<option value="${p._id}">${p.name} - ₹${p.price}</option>`
                ).join('');
            } catch (error) {
                console.error('Products load error:', error);
            }
        }

        // Event Listeners
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: document.getElementById('loginPhone').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    location.reload();
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Login failed');
            }
        });

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const productId = document.getElementById('productSelect').value;
            const quantity = document.getElementById('quantity').value;
            
            try {
                const res = await fetch('/api/products', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const products = await res.json();
                const product = products.find(p => p._id === productId);
                
                const orderRes = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        products: [{ product: productId, quantity: parseInt(quantity), price: product.price }],
                        totalAmount: product.price * quantity
                    })
                });
                
                if (orderRes.ok) {
                    alert('Order placed successfully!');
                    loadOrders();
                    loadDashboard();
                    e.target.reset();
                }
            } catch (error) {
                alert('Failed to place order');
            }
        });

        // Utility Functions
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
            document.getElementById(tabName + 'TabContent')?.classList.add('active');
        }

        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function hideModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Order Actions
        async function acceptOrder(orderId) {
            try {
                const res = await fetch(`/api/orders/${orderId}/accept`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadOrders();
                    loadDashboard();
                    alert('Order accepted!');
                }
            } catch (error) {
                alert('Failed to accept order');
            }
        }

        async function pickupOrder(orderId) {
            if (!navigator.geolocation) return alert('Geolocation not supported');
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const res = await fetch(`/api/orders/${orderId}/pickup`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ location: { lng: position.coords.longitude, lat: position.coords.latitude } })
                    });
                    if (res.ok) {
                        loadOrders();
                        loadDashboard();
                        alert('Order picked up!');
                    }
                } catch (error) {
                    alert('Failed to pickup order');
                }
            });
        }

        async function markDelivered(orderId) {
            // Implementation for marking delivered
            alert('Delivered functionality - implement server endpoint');
        }

        // Live Location Tracking
        function startLocationTracking() {
            if (!navigator.geolocation) return;
            
            watchId = navigator.geolocation.watchPosition(async (position) => {
                const location = {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude
                };
                
                document.getElementById('currentLocation').textContent = 
                    `Lat: ${location.lat.toFixed(6)}, Lng: ${location.lng.toFixed(6)}`;
                
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.marker([location.lat, location.lng]).addTo(map)
                    .bindPopup(`<b>${currentUser.name}</b><br>Live Location`);
                map.setView([location.lat, location.lng], 15);
                
                // Update server location
                try {
                    await fetch('/api/update-location', {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ lng: location.lng, lat: location.lat })
                    });
                } catch (error) {
                    console.error('Location update failed:', error);
                }
            }, console.error, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 10000
            });
        }

        // Close modals when clicking outside
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) hideModal(modal.id);
            });
        });
    </script>
</body>
</html>
