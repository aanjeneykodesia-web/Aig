<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManufacturerHub - Find Top Manufacturers Near You</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: var(--white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 4rem 0;
            margin: 2rem 0;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        .search-box {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Filters */
        .filters-section {
            background: var(--white);
            padding: 2.5rem 0;
            margin: 2rem 0;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .filter-group {
            position: relative;
        }

        .filter-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--secondary);
            font-size: 0.9rem;
        }

        .filter-select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: var(--white);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Manufacturers Grid */
        .manufacturers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .manufacturer-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .manufacturer-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .manufacturer-badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: linear-gradient(135deg, var(--success), #059669);
            color: var(--white);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .manufacturer-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .manufacturer-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .manufacturer-category {
            color: var(--success);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .distance-badge {
            background: var(--warning);
            color: var(--white);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .manufacturer-info {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
        }

        .info-item i {
            width: 20px;
            color: var(--primary);
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--secondary);
        }

        /* Registration Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            color: var(--dark);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Results Info */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 2rem;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .manufacturers-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .search-box {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Auto-grouping badges */
        .group-badge {
            display: inline-flex;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <i class="fas fa-industry"></i> ManufacturerHub
                </a>
                <div class="header-actions">
                    <a href="#" class="btn btn-outline" onclick="openRegisterModal()">
                        <i class="fas fa-plus"></i> Register Your Factory
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div>
                    <h1>Find Verified Manufacturers Near You</h1>
                    <p>Discover top-rated manufacturers across 50+ categories. Filter by location, specialty, and ratings.</p>
                    <div class="search-box">
                        <input type="text" class="search-input" id="locationSearch" placeholder="Enter your location or ZIP code">
                        <select class="search-input" id="categorySearch">
                            <option value="">All Categories</option>
                        </select>
                        <button class="btn btn-primary" onclick="searchManufacturers()">
                            <i class="fas fa-search"></i> Find Manufacturers
                        </button>
                    </div>
                </div>
                <div style="text-align: center;">
                    <i class="fas fa-map-marker-alt" style="font-size: 8rem; opacity: 0.7; margin-bottom: 1rem;"></i>
                    <p style="font-size: 1.1rem; opacity: 0.9;">Location-based matching</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="filters-section">
        <div class="container">
            <div class="filters-header">
                <h2 style="font-size: 1.8rem; font-weight: 700;">
                    <i class="fas fa-filter"></i> Advanced Filters
                </h2>
                <div>
                    <button class="btn btn-primary" onclick="clearFilters()">
                        <i class="fas fa-times"></i> Clear All
                    </button>
                </div>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label>Distance</label>
                    <select class="filter-select" id="distanceFilter">
                        <option value="">Any Distance</option>
                        <option value="10">Within 10 km</option>
                        <option value="25">Within 25 km</option>
                        <option value="50">Within 50 km</option>
                        <option value="100">Within 100 km</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Rating</label>
                    <select class="filter-select" id="ratingFilter">
                        <option value="">Any Rating</option>
                        <option value="4">4+ Stars</option>
                        <option value="4.5">4.5+ Stars</option>
                        <option value="5">5 Stars</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Established</label>
                    <select class="filter-select" id="establishedFilter">
                        <option value="">Any Year</option>
                        <option value="2015">2015 or newer</option>
                        <option value="2010">2010 or newer</option>
                        <option value="2000">2000 or newer</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Capacity</label>
                    <select class="filter-select" id="capacityFilter">
                        <option value="">Any Capacity</option>
                        <option value="small">Small (< 100 employees)</option>
                        <option value="medium">Medium (100-500 employees)</option>
                        <option value="large">Large (500+ employees)</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Results -->
    <section class="container">
        <div class="results-info">
            <div>
                <strong id="resultsCount">124</strong> manufacturers found
                <span id="autoGroupInfo" style="margin-left: 1rem; color: var(--secondary);"></span>
            </div>
            <div>
                <select id="sortFilter" style="padding: 0.5rem 1rem; border: 2px solid #e2e8f0; border-radius: 8px;">
                    <option value="distance">Sort by Distance</option>
                    <option value="rating">Sort by Rating</option>
                    <option value="name">Sort by Name</option>
                </select>
            </div>
        </div>

        <div id="manufacturersContainer" class="manufacturers-grid">
            <!-- Manufacturers will be populated by JavaScript -->
        </div>
    </section>

    <!-- Registration Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2><i class="fas fa-factory"></i> Register Your Manufacturing Business</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select class="form-input" required>
                        <option value="">Select Category</option>
                        <option value="automotive">Automotive Parts</option>
                        <option value="electronics">Electronics</option>
                        <option value="textile">Textiles & Apparel</option>
                        <option value="plastic">Plastic Products</option>
                        <option value="metal">Metal Fabrication</option>
                        <option value="furniture">Furniture</option>
                        <option value="chemical">Chemicals</option>
                        <option value="food">Food Processing</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" class="form-input" placeholder="City, State or ZIP code" required>
                </div>
                <div class="form-group">
                    <label>Established Year</label>
                    <input type="number" class="form-input" min="1900" max="2024" required>
                </div>
                <div class="form-group">
                    <label>Website (Optional)</label>
                    <input type="url" class="form-input">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="closeRegisterModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <span id="submitText">Register Business</span>
                        <span id="submitLoading" class="loading" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample manufacturer data with real-world categories and auto-grouping
        const manufacturersData = [
            {
                id: 1,
                name: "Precision Auto Components Ltd",
                category: "automotive",
                categoryLabel: "Automotive Parts",
                location: "Mumbai, MH",
                lat: 19.0760,
                lng: 72.8777,
                distance: 2.4,
                rating: 4.8,
                established: 2005,
                employees: 450,
                verified: true,
                website: "https://precisionauto.com",
                services: ["CNC Machining", "Injection Molding"]
            },
            {
                id: 2,
                name: "TechCircuit Electronics",
                category: "electronics",
                categoryLabel: "Electronics",
                location: "Bangalore, KA",
                lat: 12.9716,
                lng: 77.5946,
                distance: 15.2,
                rating: 4.6,
                established: 2012,
                employees: 320,
                verified: true,
                website: "https://techcircuit.in",
                services: ["PCB Assembly", "SMT Manufacturing"]
            },
            {
                id: 3,
                name: "SteelFab Industries",
                category: "metal",
                categoryLabel: "Metal Fabrication",
                location: "Pune, MH",
                lat: 18.5204,
                lng: 73.8567,
                distance: 8.7,
                rating: 4.9,
                established: 1998,
                employees: 1200,
                verified: true,
                website: "https://steelfab.co.in",
                services: ["Laser Cutting", "Welding", "Heavy Fabrication"]
            },
            {
                id: 4,
                name: "Textile Innovators Pvt Ltd",
                category: "textile",
                categoryLabel: "Textiles & Apparel",
                location: "Surat, GJ",
                lat: 21.1702,
                lng: 72.8311,
                distance: 45.3,
                rating: 4.4,
                established: 2010,
                employees: 280,
                verified: true,
                website: "https://textileinnovators.com",
                services: ["Fabric Weaving", "Garment Manufacturing"]
            },
            {
                id: 5,
                name: "GreenPlast Solutions",
                category: "plastic",
                categoryLabel: "Plastic Products",
                location: "Delhi, DL",
                lat: 28.7041,
                lng: 77.1025,
                distance: 32.1,
                rating: 4.7,
                established: 2015,
                employees: 180,
                verified: true,
                website: "https://greenplast.in",
                services: ["Injection Molding", "Blow Molding"]
            }
        ];

        let filteredManufacturers = [...manufacturersData];
        let userLocation = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            populateFilters();
            renderManufacturers();
        });

        function initializeApp() {
            // Simulate getting user location
            getUserLocation();
            
            // Setup event listeners
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
            setupFilterListeners();
        }

        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        calculateDistances();
                        renderManufacturers();
                    },
                    () => {
                        // Default to Mumbai coordinates
                        userLocation = { lat: 19.0760, lng: 72.8777 };
                        calculateDistances();
                    }
                );
            } else {
                userLocation = { lat: 19.0760, lng: 72.8777 };
            }
        }

        function calculateDistances() {
            manufacturersData.forEach(m => {
                m.distance = calculateDistance(
                    userLocation.lat, userLocation.lng,
                    m.lat, m.lng
                );
            });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c * 10) / 10;
        }

        function populateFilters() {
            const categories = [...new Set(manufacturersData.map(m => m.categoryLabel))];
            const categorySelect = document.getElementById('categorySearch');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.toLowerCase().replace(/ & /g, '').replace(/ /g, '-');
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        }

        function setupFilterListeners() {
            const filters = ['distanceFilter', 'ratingFilter', 'establishedFilter', 'capacityFilter', 'sortFilter'];
            filters.forEach(filterId => {
                document.getElementById(filterId).addEventListener('change', renderManufacturers);
            });
        }

        function searchManufacturers() {
            const location = document.getElementById('locationSearch').value;
            const category = document.getElementById('categorySearch').value;
            
            if (location) {
                // Simulate location search - in real app, use Google Maps API
                console.log('Searching for manufacturers near:', location);
            }
            
            renderManufacturers();
        }

        function renderManufacturers() {
            const container = document.getElementById('manufacturersContainer');
            const filters = getActiveFilters();
            filteredManufacturers = applyFilters(manufacturersData, filters);
            filteredManufacturers = sortManufacturers(filteredManufacturers, filters.sort);
            
            // Auto-grouping logic
            const groups = autoGroupManufacturers(filteredManufacturers);
            updateAutoGroupInfo(groups);
            
            container.innerHTML = '';
            
            if (filteredManufacturers.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 4rem; color: #d1d5db; margin-bottom: 1rem;"></i>
                        <h3>No manufacturers found</h3>
                        <p>Try adjusting your filters or search criteria</p>
                        <button class="btn btn-primary" onclick="clearFilters()" style="margin-top: 1rem;">
                            Clear All Filters
                        </button>
                    </div>
                `;
            } else {
                filteredManufacturers.forEach(manufacturer => {
                    container.appendChild(createManufacturerCard(manufacturer));
                });
            }
            
            document.getElementById('resultsCount').textContent = filteredManufacturers.length;
        }

        function getActiveFilters() {
            return {
                distance: document.getElementById('distanceFilter').value,
                rating: parseFloat(document.getElementById('ratingFilter').value) || 0,
                established: parseInt(document.getElementById('establishedFilter').value) || 1900,
                capacity: document.getElementById('capacityFilter').value,
                category: document.getElementById('categorySearch').value,
                sort: document.getElementById('sortFilter').value
            };
        }

        function applyFilters(data, filters) {
            return data.filter(m => {
                return (!filters.distance || m.distance <= parseInt(filters.distance)) &&
                       (!filters.rating || m.rating >= filters.rating) &&
                       (!filters.established || m.established >= filters.established) &&
                       (!filters.capacity || getCapacityCategory(m.employees) === filters.capacity) &&
                       (!filters.category || m.category === filters.category);
            });
        }

        function getCapacityCategory(employees) {
            if (employees < 100) return 'small';
            if (employees < 500) return 'medium';
            return 'large';
        }

        function sortManufacturers(data, sortBy) {
            return [...data].sort((a, b) => {
                switch(sortBy) {
                    case 'distance': return a.distance - b.distance;
                    case 'rating': return b.rating - a.rating;
                    case 'name': return a.name.localeCompare(b.name);
                    default: return a.distance - b.distance;
                }
            });
        }

        function autoGroupManufacturers(manufacturers) {
            const groups = {};
            
            // Group by category
            manufacturers.forEach(m => {
                if (!groups[m.categoryLabel]) {
                    groups[m.categoryLabel] = [];
                }
                groups[m.categoryLabel].push(m);
            });
            
            return groups;
        }

        function updateAutoGroupInfo(groups) {
            const info = document.getElementById('autoGroupInfo');
            const topGroups = Object.entries(groups)
                .sort(([,a], [,b]) => b.length - a.length)
                .slice(0, 3);
            
            info.innerHTML = topGroups.map(([group, count]) => 
                `<span class="group-badge">${group} (${count.length})</span>`
            ).join('');
        }

        function createManufacturerCard(manufacturer) {
            const card = document.createElement('div');
            card.className = 'manufacturer-card';
            card.innerHTML = `
                <div class="manufacturer-badge">${manufacturer.verified ? 'VERIFIED' : 'NEW'}</div>
                <div class="manufacturer-logo">
                    <i class="fas fa-${getCategoryIcon(manufacturer.category)}"></i>
                </div>
                <h3 class="manufacturer-name">${manufacturer.name}</h3>
                <div class="manufacturer-category">
                    <i class="fas fa-tag"></i>
                    ${manufacturer.categoryLabel}
                    <span class="distance-badge">${manufacturer.distance} km away</span>
                </div>
                <div class="manufacturer-info">
                    <div class="info-item">
                        <i class="fas fa-star"></i>
                        ${manufacturer.rating} (${Math.floor(Math.random() * 100) + 50} reviews)
                    </div>
                    <div class="info-item">
                        <i class="fas fa-calendar"></i>
                        Est. ${manufacturer.established}
                    </div>
                    <div class="info-item">
                        <i class="fas fa-users"></i>
                        ${manufacturer.employees.toLocaleString()} employees
                    </div>
                    <div class="info-item">
                        <i class="fas fa-globe"></i>
                        ${manufacturer.location}
                    </div>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-number">${manufacturer.services.length}</div>
                        <div class="stat-label">Services</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">98%</div>
                        <div class="stat-label">On-time Delivery</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number">2.4K</div>
                        <div class="stat-label">Projects</div>
                    </div>
                </div>
            `;
            return card;
        }

        function getCategoryIcon(category) {
            const icons = {
                automotive: 'car',
                electronics: 'microchip',
                textile: 'tshirt',
                plastic: 'cube',
                metal: 'industry',
                furniture: 'couch',
                chemical: 'flask',
                food: 'utensils'
            };
            return icons[category] || 'industry';
        }

        function clearFilters() {
            document.getElementById('distanceFilter').value = '';
            document.getElementById('ratingFilter').value = '';
            document.getElementById('establishedFilter').value = '';
            document.getElementById('capacityFilter').value = '';
            document.getElementById('categorySearch').value = '';
            document.getElementById('sortFilter').value = 'distance';
            document.getElementById('locationSearch').value = '';
            renderManufacturers();
        }

        // Modal functions
        function openRegisterModal() {
            document.getElementById('registerModal').classList.add('active');
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').classList.remove('active');
            document.getElementById('registerForm').reset();
        }

        function handleRegister(e) {
            e.preventDefault();
            const submitText = document.getElementById('submitText');
            const submitLoading = document.getElementById('submitLoading');
            
            submitText.style.display = 'none';
            submitLoading.style.display = 'inline-block';
            
            // Simulate API call
            setTimeout(() => {
                alert('✅ Thank you for registering! Your business will be reviewed and listed within 24 hours.');
                closeRegisterModal();
                submitText.style.display = 'inline';
                submitLoading.style.display = 'none';
            }, 2000);
        }

        // Close modal on outside click
        document.getElementById('registerModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRegisterModal();
            }
        });
    </script>
</body>
</html>
