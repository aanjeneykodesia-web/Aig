<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack - Complete Logistics Platform</title>
    <!-- All previous styles + Role-specific styles -->
    <style>
        /* Previous styles + New role-specific styles */
        
        /* Role-specific backgrounds */
        .role-manufacturer { --primary: linear-gradient(135deg, #28a745 0%, #20c997 100%); }
        .role-transporter { --primary: linear-gradient(135deg, #007bff 0%, #0056b3 100%); }
        .role-shopkeeper { --primary: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%); }
        .role-admin { --primary: linear-gradient(135deg, #6f42c1 0%, #5a1f8c 100%); }
        
        /* Profile cards */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 30px;
            background: linear-gradient(135deg, var(--primary) 0%, rgba(102,126,234,0.1) 100%);
            border-radius: 24px;
            margin-bottom: 30px;
            color: white;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }
        
        /* Analytics charts placeholder */
        .chart-placeholder {
            height: 300px;
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            margin-bottom: 25px;
        }
        
        /* Order cards */
        .order-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            border-radius: 20px;
            background: white;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .order-info h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .order-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14px;
            color: #64748b;
        }
        
        /* Product grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        .product-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }
        
        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #cbd5e1;
        }
        
        .product-details {
            padding: 25px;
        }
        
        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin: 10px 0;
        }
        
        /* Verification badges */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34,197,94,0.2);
            color: #16a34a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Online status */
        .online-indicator {
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-online 2s infinite;
        }
        
        @keyframes pulse-online {
            0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }
    </style>
</head>
<body>
    <!-- Enhanced Login Modal (Previous) -->
    
    <!-- Enhanced Main Layout -->
    <div class="container" id="mainContainer" style="display: none;">
        <!-- Dynamic Role Content -->
        <div id="roleDashboard">
            <!-- Role-specific content loaded here -->
        </div>
    </div>

    <script>
        // Role Pages Data Structure
        const rolePages = {
            manufacturer: {
                title: 'Manufacturer Dashboard',
                icon: 'fas fa-industry',
                stats: ['totalOrders', 'pendingOrders', 'activeOrders', 'totalRevenue'],
                widgets: [
                    { type: 'profile', title: 'Your Business' },
                    { type: 'orders', title: 'Recent Orders', limit: 5 },
                    { type: 'products', title: 'Products', action: 'addProduct' },
                    { type: 'analytics', title: 'Sales Analytics' },
                    { type: 'map', title: 'Delivery Zones' }
                ]
            },
            transporter: {
                title: 'Transporter Dashboard',
                icon: 'fas fa-truck',
                stats: ['totalOrders', 'activeDeliveries', 'earnings', 'rating'],
                widgets: [
                    { type: 'profile', title: 'Driver Profile' },
                    { type: 'activeOrders', title: 'Active Deliveries', limit: 3 },
                    { type: 'earnings', title: 'Today\'s Earnings' },
                    { type: 'map', title: 'Live Route Tracking' },
                    { type: 'availability', title: 'Set Availability' }
                ]
            },
            shopkeeper: {
                title: 'Shopkeeper Dashboard',
                icon: 'fas fa-store',
                stats: ['totalOrders', 'pendingOrders', 'totalSpent'],
                widgets: [
                    { type: 'profile', title: 'Your Store' },
                    { type: 'recentOrders', title: 'Recent Orders', limit: 5 },
                    { type: 'products', title: 'Recommended Products', limit: 4 },
                    { type: 'newOrder', title: 'Place New Order' },
                    { type: 'map', title: 'Nearby Manufacturers' }
                ]
            },
            admin: {
                title: 'Admin Dashboard',
                icon: 'fas fa-crown',
                stats: ['totalUsers', 'totalOrders', 'totalRevenue', 'activeTransporters'],
                widgets: [
                    { type: 'overview', title: 'Platform Overview' },
                    { type: 'users', title: 'All Users' },
                    { type: 'orders', title: 'All Orders' },
                    { type: 'analytics', title: 'Platform Analytics' },
                    { type: 'verification', title: 'Pending Verifications' }
                ]
            }
        };

        async function loadRoleDashboard() {
            const role = currentUser.role;
            const pageConfig = rolePages[role];
            
            // Set role-specific styling
            document.body.className = `role-${role}`;
            
            // Load dashboard data
            const res = await fetch(`/api/dashboard/${role}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const { data } = await res.json();
            
            renderRoleDashboard(pageConfig, data);
        }

        function renderRoleDashboard(config, data) {
            const container = document.getElementById('roleDashboard');
            container.innerHTML = `
                <header class="header" style="display: block;">
                    <div class="header-content">
                        <div class="logo role-${currentUser.role}">
                            <i class="${config.icon}"></i> ${config.title}
                        </div>
                        <div class="header-actions">
                            <div class="user-avatar" onclick="showProfile()">
                                ${currentUser.name.charAt(0).toUpperCase()}
                            </div>
                        </div>
                    </div>
                </header>

                <div class="container">
                    <div class="main-layout">
                        <!-- Profile Card -->
                        <div class="card profile-card">
                            <div class="profile-avatar">${currentUser.name.charAt(0)}</div>
                            <div>
                                <h2>${currentUser.name}</h2>
                                <p>${currentUser.companyName || 'Your Business'}</p>
                                ${currentUser.isVerified ? '<div class="verified-badge"><i class="fas fa-check-circle"></i> Verified</div>' : ''}
                                <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                                    <div class="online-indicator"></div>
                                    <span>Online</span>
                                </div>
                            </div>
                            <div style="margin-left: auto;">
                                <div style="font-size: 28px; font-weight: 700;">${data.stats?.totalOrders || 0}</div>
                                <div style="font-size: 14px; opacity: 0.9;">Total Orders</div>
                            </div>
                        </div>

                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            ${renderStats(config.stats, data.stats)}
                        </div>

                        <div class="grid-2">
                            ${config.widgets.map(widget => renderWidget(widget, data)).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStats(stats, data) {
            return stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-number">${formatNumber(data[stat] || 0)}</div>
                    <div class="stat-label">${stat.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase()).trim()}</div>
                </div>
            `).join('');
        }

        function renderWidget(widget, data) {
            const cards = {
                profile: `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas fa-user-circle"></i></div>
                            <h3 class="card-title">${widget.title}</h3>
                        </div>
                        <div style="text-align: center; padding: 40px;">
                            <i class="fas fa-chart-line" style="font-size: 64px; color: #cbd5e1; margin-bottom: 20px;"></i>
                            <p style="color: #64748b;">Analytics coming soon</p>
                        </div>
                    </div>
                `,
                orders: `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas fa-list"></i></div>
                            <h3 class="card-title">${widget.title}</h3>
                        </div>
                        <div id="orders-${widget.title.toLowerCase()}">
                            ${data.recentOrders?.slice(0, widget.limit || 5).map(order => `
                                <div class="order-card">
                                    <div class="order-info">
                                        <h4>#${order.orderId}</h4>
                                        <div class="order-meta">
                                            <span><i class="fas fa-user"></i> ${order.shopkeeper?.name}</span>
                                            <span><i class="fas fa-map-marker-alt"></i> ${order.status}</span>
                                        </div>
                                    </div>
                                    <div style="text-align: right;">
                                        <div style="font-size: 20px; font-weight: 700;">₹${order.totalAmount}</div>
                                        <span class="status-badge status-${order.status}">${order.status}</span>
                                    </div>
                                </div>
                            `).join('') || '<p style="text-align: center; color: #64748b;">No orders yet</p>'}
                        </div>
                    </div>
                `,
                products: `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas fa-boxes"></i></div>
                            <h3 class="card-title">${widget.title}</h3>
                            ${currentUser.role === 'manufacturer' ? '<button class="btn btn-primary" style="margin-left: auto;"><i class="fas fa-plus"></i> Add Product</button>' : ''}
                        </div>
                        <div class="products-grid">
                            ${data.recommendedProducts?.slice(0, widget.limit || 8).map(product => `
                                <div class="product-card">
                                    <div class="product-image">
                                        <i class="fas fa-box"></i>
                                    </div>
                                    <div class="product-details">
                                        <h4>${product.name}</h4>
                                        <div class="product-price">₹${product.price}</div>
                                        <div style="color: #64748b; font-size: 14px;">
                                            Stock: ${product.stock} units
                                        </div>
                                    </div>
                                </div>
                            `).join('') || Array(4).fill().map(() => `
                                <div class="product-card">
                                    <div class="product-image"><i class="fas fa-box"></i></div>
                                    <div class="product-details">
                                        <h4>Product Name</h4>
                                        <div class="product-price">₹0</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `,
                map: `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas fa-map-marked-alt"></i></div>
                            <h3 class="card-title">${widget.title}</h3>
                        </div>
                        <div id="roleMap" style="height: 350px; border-radius: 20px; margin-bottom: 20px;"></div>
                    </div>
                `,
                newOrder: `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon"><i class="fas fa-shopping-cart"></i></div>
                            <h3 class="card-title">${widget.title}</h3>
                        </div>
                        <form id="quickOrderForm">
                            <div class="form-group">
                                <label class="form-label">Select Product</label>
                                <select class="form-control">
                                    <option>Choose a product</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Quantity</label>
                                <input type="number" class="form-control" min="1" value="1">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">
                                Place Order Now
                            </button>
                        </form>
                    </div>
                `
            };
            
            return cards[widget.type] || `<div class="card"><div class="chart-placeholder">${widget.title}</div></div>`;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat().format(num);
        }

        // Initialize with role dashboard
        async function initApp() {
            // Previous init code...
            await loadRoleDashboard();
        }
    </script>
</body>
</html>
