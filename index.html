<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-purple-900 to-blue-900 min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-white text-center mb-8">🤖 AI Chat</h1>
        
        <div id="chat" class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-6 h-96 overflow-y-auto space-y-4"></div>
        
        <div class="flex gap-2">
            <input id="message" type="text" placeholder="Ask AI anything..." 
                   class="flex-1 bg-white/20 text-white placeholder-white/50 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-white/50">
            <button onclick="sendMessage()" class="bg-gradient-to-r from-purple-500 to-blue-500 text-white px-6 py-4 rounded-xl hover:scale-105 transition-all">Send</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const messageInput = document.getElementById('message');
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            chat.innerHTML += `<div class="flex justify-end"><div class="bg-blue-500 text-white p-3 rounded-2xl max-w-xs">${message}</div></div>`;
            messageInput.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            // Show typing
            const typing = document.createElement('div');
            typing.className = 'flex items-center gap-2 text-gray-300';
            typing.innerHTML = '<div>User</div><div class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';
            chat.appendChild(typing);
            chat.scrollTop = chat.scrollHeight;
            
            try {
                const response = await fetch('https://api.openai-proxy.replit.dev/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer pk-free-key'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{role: 'user', content: message}],
                        stream: false
                    })
                });
                
                const data = await response.json();
                chat.removeChild(typing);
                
                // Add AI response
                chat.innerHTML += `<div class="flex"><div class="bg-white/20 text-white p-3 rounded-2xl max-w-xs">${data.choices[0].message.content}</div></div>`;
            } catch (e) {
                chat.removeChild(typing);
                chat.innerHTML += `<div class="flex"><div class="bg-red-500 text-white p-3 rounded-2xl max-w-xs">Error: Try again</div></div>`;
            }
            
            chat.scrollTop = chat.scrollHeight;
        }
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
