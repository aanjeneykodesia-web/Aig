<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Extractor - OFFLINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
        .result-item { background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(16,185,129,0.2)); }
    </style>
</head>
<body class="gradient-bg min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-lg px-6 py-3 rounded-full mb-6 shadow-2xl">
                <i class="fas fa-robot text-2xl text-yellow-400"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-white">Data Extractor Pro</h1>
            </div>
            <p class="text-xl text-white/90 max-w-2xl mx-auto mb-4">
                ✅ Extract emails, phones, addresses, URLs <strong>INSTANTLY</strong> - Works offline!
            </p>
            <div class="bg-green-500/20 border border-green-400/50 p-4 rounded-2xl max-w-md mx-auto">
                <i class="fas fa-check-circle text-green-400 mr-2"></i>
                <span class="font-semibold text-green-100">100% Offline - No Errors!</span>
            </div>
        </div>

        <!-- Main App -->
        <div class="grid lg:grid-cols-2 gap-8 items-start">
            <!-- Input -->
            <div class="glass rounded-3xl p-8 border border-white/20 shadow-2xl">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fas fa-edit text-2xl text-blue-400"></i>
                    <h2 class="text-2xl font-bold text-white">📝 Input Text</h2>
                </div>
                
                <textarea 
                    id="inputText" 
                    rows="12"
                    placeholder="Paste ANY text here:
- Emails: john@example.com
- Phones: (555) 123-4567, 555-123-4567
- Addresses: 123 Main St, NYC
- URLs: https://example.com
- Names: John Doe
- Twitter: @username

Ctrl+Enter = Extract Instantly!"
                    class="w-full p-6 rounded-2xl bg-white/10 backdrop-blur-sm text-white placeholder-white/70 
                           border-2 border-white/20 focus:border-blue-400 focus:outline-none focus:ring-4 
                           ring-blue-400/30 resize-vertical text-lg font-mono min-h-[200px]"
                ></textarea>
                
                <div class="mt-6 flex gap-3">
                    <button onclick="extractData()" 
                            class="flex-1 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 
                                   text-white py-4 px-6 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl 
                                   transition-all duration-300 flex items-center justify-center gap-3">
                        <i class="fas fa-bolt text-xl"></i>
                        <span>🔍 Extract Data</span>
                    </button>
                    <button onclick="clearAll()" class="bg-gradient-to-r from-slate-600 to-slate-700 hover:from-slate-700 hover:to-slate-800 
                                   text-white py-4 px-6 rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div class="glass rounded-3xl p-8 border border-white/20 shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-list text-2xl text-emerald-400"></i>
                        <h2 class="text-2xl font-bold text-white">📊 Extracted Data</h2>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyAll()" title="Copy" class="p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-all">
                            <i class="fas fa-copy text-white"></i>
                        </button>
                        <button onclick="downloadTxt()" title="Download" class="p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-all">
                            <i class="fas fa-download text-white"></i>
                        </button>
                    </div>
                </div>
                
                <div id="results" class="space-y-4 min-h-[400px] text-sm leading-relaxed">
                    <div class="text-center py-12 text-white/50">
                        <i class="fas fa-mouse-pointer text-3xl mb-4 opacity-50"></i>
                        <div>Paste text above → Click Extract</div>
                        <div class="text-xs mt-2">Works on emails, phones, addresses, URLs, names!</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Toast -->
        <div id="toast" class="fixed top-6 right-6 bg-emerald-500 text-white px-6 py-4 rounded-2xl shadow-2xl 
                             hidden flex items-center gap-3 font-medium z-50 animate-pulse">
            <i class="fas fa-check"></i>
            <span id="toastText"></span>
        </div>
    </div>

    <script>
        // Super accurate regex patterns
        const patterns = {
            emails: /(\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b)/gi,
            phones: /(\+?1[-.\s]?)?\$?([0-9]{3})\$?[-.\s]?([0-9]{3})[-.\s]?([0-9]{4})/gi,
            urls: /(https?:\/\/[^\s]+)/gi,
            names: /\b([A-Z][a-z]+(?:\s[A-Z][a-z]+)+)\b/gi,
            addresses: /(?:\d+\s+)(?:[A-Za-z0-9\s\-.,#]+?)(?:\s+(?:St|Rd|Ave|Blvd|Dr|Ln|Way|Ct|Pl|Square|Square|Terr|Terrace|Parkway|Circle|Pkwy|Dr|Street|Road|Avenue|Boulevard|Drive|Lane|Court|Place))\.?/gi,
            twitter: /@([A-Za-z0-9_]+)/gi
        };

        function extractData() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) {
                showToast('Enter some text first!', 'warning');
                return;
            }

            const results = {};
            
            // Extract each type
            Object.entries(patterns).forEach(([type, regex]) => {
                const matches = [...text.matchAll(regex)].map(match => match[0]).filter((v, i, a) => a.indexOf(v) === i);
                if (matches.length) results[type] = matches;
            });

            displayResults(results);
            showToast(`Extracted ${Object.values(results).flat().length} items!`, 'success');
        }

        function displayResults(data) {
            let html = '';
            
            if (Object.keys(data).length === 0) {
                html = '<div class="text-center py-8 text-white/60"><i class="fas fa-search text-4xl mb-4"></i><div>No data found</div></div>';
            } else {
                Object.entries(data).forEach(([type, items]) => {
                    const icons = {
                        emails: '📧', phones: '📞', urls: '🌐', names: '👤', 
                        addresses: '🏠', twitter: '🐦'
                    };
                    html += `
                        <div class="result-item p-4 rounded-2xl border-l-4 border-emerald-400">
                            <div class="flex items-center gap-3 mb-3 font-bold text-emerald-100 text-lg">
                                ${icons[type] || '📋'} ${type.toUpperCase()}
                                <span class="bg-emerald-500/30 px-2 py-1 rounded-full text-xs font-bold">${items.length}</span>
                            </div>
                            <div class="space-y-1">
                                ${items.map(item => `<div class="bg-white/10 px-3 py-2 rounded-xl text-sm hover:bg-white/20 transition-all cursor-pointer" onclick="copyItem('${item.replace(/'/g, "\\'")}')">${item}</div>`).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            
            document.getElementById('results').innerHTML = html;
        }

        function copyItem(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copied to clipboard!', 'success');
            });
        }

        function copyAll() {
            const items = Array.from(document.querySelectorAll('#results div[onclick]')).map(el => el.textContent).join('\n');
            navigator.clipboard.writeText(items).then(() => {
                showToast('All data copied!', 'success');
            });
        }

        function downloadTxt() {
            const items = Array.from(document.querySelectorAll('#results div[onclick]')).map(el => el.textContent).join('\n');
            const blob = new Blob([items], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `extracted-data-${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Downloaded!', 'success');
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('results').innerHTML = `
                <div class="text-center py-12 text-white/50">
                    <i class="fas fa-trash-alt text-4xl mb-4 opacity-50"></i>
                    <div>Input cleared</div>
                </div>
            `;
            showToast('Cleared!', 'info');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = type === 'warning' ? 'fas fa-exclamation-triangle' : 'fas fa-check';
            const color = type === 'warning' ? 'orange' : 'emerald';
            
            document.getElementById('toastText').textContent = message;
            toast.innerHTML = `<i class="${icon}"></i><span id="toastText">${message}</span>`;
            toast.className = `fixed top-6 right-6 bg-${color}-500 text-white px-6 py-4 rounded-2xl shadow-2xl hidden flex items-center gap-3 font-medium z-50 animate-pulse`;
            toast.classList.remove('hidden');
            
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // Hotkeys
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                extractData();
            }
            if (e.key === 'Escape') {
                document.getElementById('inputText').focus();
            }
        });

        // Auto-resize textarea
        document.getElementById('inputText').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Example on load
        setTimeout(() => {
            document.getElementById('inputText').value = `Contact John Doe
Email: john.doe@company.com
Phone: (555) 123-4567 | 555-123-4567
Address: 123 Main Street, New York, NY 10001
Website: https://example.com
Twitter: @johndoe linkedin.com/in/johndoe
Company: Example Corp`;
        }, 500);
    </script>
</body>
</html>
