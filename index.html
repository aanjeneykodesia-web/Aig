<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawer - Claw Machine Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Claw Machine */
        .claw-machine {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 500px;
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border: 8px solid #1a252f;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .machine-top {
            height: 80px;
            background: linear-gradient(145deg, #34495e, #2c3e50);
            border-radius: 12px 12px 0 0;
            position: relative;
            border-bottom: 4px solid #1a252f;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .control-btn {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .move-btn {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            color: white;
        }

        .grab-btn {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        /* Claw Mechanism */
        .claw-arm {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 300px;
            background: linear-gradient(to bottom, #bdc3c7, #95a5a6);
            z-index: 10;
        }

        .claw-head {
            position: absolute;
            top: 370px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #f1c40f, #f39c12);
            border-radius: 50%;
            border: 4px solid #d68910;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .claw-open {
            width: 80px;
            height: 80px;
        }

        .claw-grip {
            position: absolute;
            width: 20px;
            height: 40px;
            background: #e74c3c;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .claw-grip.left {
            left: 5px;
            transform-origin: top center;
        }

        .claw-grip.right {
            right: 5px;
            transform-origin: top center;
        }

        /* Prizes */
        .prize-area {
            position: absolute;
            top: 90px;
            left: 20px;
            width: 360px;
            height: 380px;
            overflow: hidden;
            border-radius: 10px;
            background: linear-gradient(145deg, #ecf0f1, #bdc3c7);
        }

        .prize {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .prize:hover {
            transform: scale(1.1);
            z-index: 5;
        }

        .prize.captured {
            opacity: 0;
            transform: scale(0);
        }

        /* Prize styles */
        .teddy { 
            width: 50px; height: 50px; 
            background: radial-gradient(circle at 30% 30%, #e91e63, #ad1457);
            border-radius: 50% 40% 50% 40%;
            top: 50px; left: 50px;
        }

        .ball { 
            width: 45px; height: 45px; 
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            border-radius: 50%;
            top: 100px; left: 250px;
        }

        .candy { 
            width: 40px; height: 60px; 
            background: linear-gradient(45deg, #ff9ff3, #f368e0);
            border-radius: 20px 20px 5px 5px;
            top: 200px; left: 80px;
        }

        .ring { 
            width: 55px; height: 55px; 
            border: 8px solid #00d2d3;
            border-radius: 50%;
            border-top: none;
            top: 150px; left: 280px;
        }

        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Score */
        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #f1c40f;
            border-radius: 50%;
            pointer-events: none;
            animation: particle-float 1s ease-out forwards;
        }

        @keyframes particle-float {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0);
            }
        }

        /* Moving between pages effect */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .page-transition.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        
        <div class="claw-machine">
            <div class="machine-top"></div>
            <div class="claw-arm" id="clawArm"></div>
            <div class="claw-head" id="clawHead">
                <div class="claw-grip left" id="leftGrip"></div>
                <div class="claw-grip right" id="rightGrip"></div>
            </div>
            <div class="prize-area">
                <div class="prize teddy" data-value="100"></div>
                <div class="prize ball" data-value="50"></div>
                <div class="prize candy" data-value="75"></div>
                <div class="prize ring" data-value="80"></div>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn move-btn" onclick="moveClaw('left')">← Move Left</button>
            <button class="control-btn move-btn" onclick="moveClaw('right')">→ Move Right</button>
            <button class="control-btn grab-btn" onclick="grabPrize()">🕷️ GRAB</button>
        </div>

        <div class="page-transition" id="pageTransition"></div>
    </div>

    <script>
        class ClawerGame {
            constructor() {
                this.clawX = 50; // Starting position (0-100%)
                this.clawY = 370;
                this.score = 0;
                this.isGrabbing = false;
                this.grabbedPrize = null;
                this.init();
            }

            init() {
                this.clawHead = document.getElementById('clawHead');
                this.clawArm = document.getElementById('clawArm');
                this.leftGrip = document.getElementById('leftGrip');
                this.rightGrip = document.getElementById('rightGrip');
                this.scoreEl = document.getElementById('score');
                this.prizes = document.querySelectorAll('.prize');
                this.updateScore();
                this.attachPrizeEvents();
            }

            moveClaw(direction) {
                if (this.isGrabbing) return;

                const step = 10;
                if (direction === 'left' && this.clawX > 0) {
                    this.clawX = Math.max(0, this.clawX - step);
                } else if (direction === 'right' && this.clawX < 100) {
                    this.clawX = Math.min(100, this.clawX + step);
                }

                this.updateClawPosition();
            }

            updateClawPosition() {
                const machineRect = document.querySelector('.claw-machine').getBoundingClientRect();
                const xPos = machineRect.left + (machineRect.width * (this.clawX / 100));
                
                this.clawArm.style.left = `${xPos - machineRect.left}px`;
                this.clawHead.style.left = `${xPos - machineRect.left}px`;
            }

            grabPrize() {
                if (this.isGrabbing) return;

                this.isGrabbing = true;
                this.clawHead.classList.add('claw-open');

                // Check for prize collision
                const clawRect = this.clawHead.getBoundingClientRect();
                let caughtPrize = null;

                this.prizes.forEach(prize => {
                    if (prize.classList.contains('captured')) return;
                    
                    const prizeRect = prize.getBoundingClientRect();
                    if (this.isColliding(clawRect, prizeRect)) {
                        caughtPrize = prize;
                    }
                });

                if (caughtPrize) {
                    this.grabbedPrize = caughtPrize;
                    caughtPrize.classList.add('captured');
                    this.createParticles(clawRect);
                }

                // Animate grab
                setTimeout(() => {
                    this.clawHead.classList.remove('claw-open');
                    this.liftPrize();
                }, 500);
            }

            isColliding(rect1, rect2) {
                return !(rect1.right < rect2.left || 
                        rect1.left > rect2.right || 
                        rect1.bottom < rect2.top || 
                        rect1.top > rect2.bottom);
            }

            liftPrize() {
                if (!this.grabbedPrize) {
                    this.isGrabbing = false;
                    return;
                }

                // Lift claw
                this.clawY = 100;
                this.updateClawPosition();

                setTimeout(() => {
                    if (this.grabbedPrize) {
                        this.score += parseInt(this.grabbedPrize.dataset.value);
                        this.updateScore();
                        this.triggerPageTransition();
                    }
                    this.resetClaw();
                }, 1000);
            }

            resetClaw() {
                this.clawY = 370;
                this.clawX = 50;
                this.grabbedPrize = null;
                this.isGrabbing = false;
                this.updateClawPosition();
            }

            updateScore() {
                this.scoreEl.textContent = this.score;
            }

            createParticles(rect) {
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = `${rect.left + Math.random() * rect.width}px`;
                    particle.style.top = `${rect.bottom}px`;
                    document.body.appendChild(particle);

                    setTimeout(() => particle.remove(), 1000);
                }
            }

            triggerPageTransition() {
                const transition = document.getElementById('pageTransition');
                transition.classList.add('active');
                
                setTimeout(() => {
                    transition.classList.remove('active');
                }, 1500);
            }

            attachPrizeEvents() {
                this.prizes.forEach(prize => {
                    prize.addEventListener('click', (e) => {
                        this.moveClawToPrize(prize);
                    });
                });
            }

            moveClawToPrize(prize) {
                const prizeRect = prize.getBoundingClientRect();
                const machineRect = document.querySelector('.claw-machine').getBoundingClientRect();
                const targetX = ((prizeRect.left + prizeRect.width / 2 - machineRect.left) / machineRect.width) * 100;
                
                this.clawX = targetX;
                this.updateClawPosition();
            }
        }

        // Initialize game
        const game = new ClawerGame();

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft':
                    game.moveClaw('left');
                    break;
                case 'ArrowRight':
                    game.moveClaw('right');
                    break;
                case ' ':
                    e.preventDefault();
                    game.grabPrize();
                    break;
            }
        });

        // Responsive
        window.addEventListener('resize', () => {
            game.updateClawPosition();
        });
    </script>
</body>
</html>
