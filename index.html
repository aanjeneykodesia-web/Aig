<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebClawer - Website Data Extractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            grid-template-rows: 60px 1fr;
            height: 100vh;
            gap: 1px;
            background: #1a1a1a;
        }

        /* Control Panel */
        .control-panel {
            grid-column: 1;
            grid-row: 1 / -1;
            background: #111;
            border-right: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
        }

        .panel-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #00ff88;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            color: #00ff88;
            font-family: inherit;
            font-size: 13px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0,255,136,0.4);
        }

        .btn.danger {
            background: linear-gradient(145deg, #ff4757, #ff3742);
        }

        /* Navigation Tree */
        .nav-tree {
            margin-top: 20px;
        }

        .nav-item {
            padding: 8px 12px;
            background: rgba(0,255,136,0.1);
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0,255,136,0.2);
            border-left-color: #00ff88;
        }

        /* Preview */
        .preview {
            grid-column: 2;
            grid-row: 1 / -1;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #00ff88;
            font-size: 18px;
            z-index: 10;
        }

        /* Data Panel */
        .data-panel {
            grid-column: 3;
            grid-row: 1 / -1;
            background: #111;
            border-left: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .data-header {
            font-size: 16px;
            margin-bottom: 15px;
            color: #00ff88;
        }

        .data-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0,255,136,0.1);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .data-list {
            flex: 1;
            overflow-y: auto;
        }

        .data-item {
            background: rgba(0,255,136,0.05);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
            animation: slideIn 0.3s ease-out;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .json-viewer {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #aaa;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: #000;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            font-size: 12px;
            padding: 0 20px;
            z-index: 100;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #ff4757;
        }

        .status-indicator.crawling { background: #ffa502; }
        .status-indicator.success { background: #2ed573; }
        .status-indicator.error { background: #ff4757; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Panel -->
        <div class="control-panel">
            <div class="panel-header">🔍 WebClawer</div>
            
            <div class="input-group">
                <label>Start URL</label>
                <input type="url" id="startUrl" value="https://example.com" placeholder="https://example.com">
            </div>

            <div class="input-group">
                <label>Max Depth</label>
                <select id="maxDepth">
                    <option value="1">1 Level</option>
                    <option value="2" selected>2 Levels</option>
                    <option value="3">3 Levels</option>
                    <option value="5">5 Levels</option>
                </select>
            </div>

            <div class="input-group">
                <label>Extract</label>
                <select id="extractType" multiple size="4">
                    <option value="title" selected>Page Title</option>
                    <option value="links" selected>All Links</option>
                    <option value="emails" selected>Email Addresses</option>
                    <option value="phones" selected>Phone Numbers</option>
                    <option value="forms">Forms</option>
                    <option value="images">Images</option>
                </select>
            </div>

            <button class="btn" onclick="clawer.startCrawling()">🚀 Start Crawling</button>
            <button class="btn" onclick="clawer.stopCrawling()">⏹️ Stop</button>
            <button class="btn danger" onclick="clawer.clearAll()">🗑️ Clear All</button>

            <div class="nav-tree" id="navTree"></div>
        </div>

        <!-- Preview -->
        <div class="preview">
            <div class="preview-overlay" id="previewOverlay">
                <div>🎯 Target Website Preview</div>
                <div style="font-size: 14px; margin-top: 10px; color: #aaa;">
                    Claw will navigate here automatically
                </div>
            </div>
            <iframe id="previewFrame" style="display: none;"></iframe>
        </div>

        <!-- Data Panel -->
        <div class="data-panel">
            <div class="data-header">📊 Extracted Data</div>
            <div class="data-stats">
                <div class="stat-item">
                    <div style="font-size: 20px; font-weight: bold;" id="totalPages">0</div>
                    <div>Pages</div>
                </div>
                <div class="stat-item">
                    <div style="font-size: 20px; font-weight: bold;" id="totalData">0</div>
                    <div>Records</div>
                </div>
            </div>
            <div class="data-list" id="dataList"></div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="statusText">Ready</span>
        <span style="margin-left: auto;" id="currentUrl"></span>
    </div>

    <script>
        class WebClawer {
            constructor() {
                this.isCrawling = false;
                this.visitedUrls = new Set();
                this.extractedData = [];
                this.navigationHistory = [];
                this.maxDepth = 2;
                this.currentDepth = 0;
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateStatus('Ready', 'idle');
            }

            bindEvents() {
                document.getElementById('startUrl').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.startCrawling();
                });
            }

            async startCrawling() {
                if (this.isCrawling) return;

                const startUrl = document.getElementById('startUrl').value.trim();
                if (!startUrl) {
                    this.showError('Enter a valid URL');
                    return;
                }

                this.isCrawling = true;
                this.maxDepth = parseInt(document.getElementById('maxDepth').value);
                this.visitedUrls.clear();
                this.extractedData = [];
                this.navigationHistory = [];
                this.currentDepth = 0;

                this.updateStatus('Starting crawl...', 'crawling');
                await this.crawl(startUrl, 0);
                this.isCrawling = false;
                this.updateStatus('Crawl completed', 'success');
            }

            async crawl(url, depth) {
                if (depth > this.maxDepth || this.visitedUrls.has(url)) return;
                
                this.visitedUrls.add(url);
                this.navigationHistory.push({ url, depth });
                this.updateNavTree();
                this.previewPage(url);

                try {
                    const data = await this.extractFromUrl(url);
                    if (data) {
                        this.extractedData.push({
                            url,
                            depth,
                            timestamp: new Date().toISOString(),
                            ...data
                        });
                        this.renderData();
                    }

                    // Find and crawl links
                    if (depth < this.maxDepth) {
                        const links = data?.links || [];
                        for (const link of links.slice(0, 5)) { // Limit to 5 links per page
                            if (this.isSameDomain(link, new URL(url).origin)) {
                                await this.crawl(link, depth + 1);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Crawl error:', error);
                }
            }

            previewPage(url) {
                const frame = document.getElementById('previewFrame');
                const overlay = document.getElementById('previewOverlay');
                
                frame.src = url;
                frame.onload = () => {
                    overlay.style.display = 'none';
                    frame.style.display = 'block';
                    document.getElementById('currentUrl').textContent = url;
                };
            }

            async extractFromUrl(url) {
                try {
                    // Simulate API extraction (in real implementation, use server-side scraping)
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    const html = data.contents;

                    return {
                        title: this.extractTitle(html),
                        links: this.extractLinks(html, url),
                        emails: this.extractEmails(html),
                        phones: this.extractPhones(html),
                        forms: this.extractForms(html)
                    };
                } catch (error) {
                    return null;
                }
            }

            extractTitle(html) {
                const match = html.match(/<title[^>]*>([^<]+)<\/title>/i);
                return match ? match[1].trim() : 'No title';
            }

            extractLinks(html, baseUrl) {
                const links = [];
                const urlRegex = /href=["']([^"']+)["']/gi;
                let match;
                while ((match = urlRegex.exec(html)) !== null) {
                    let link = match[1];
                    if (link.startsWith('http') || link.startsWith('//')) {
                        links.push(link);
                    } else if (link.startsWith('/')) {
                        const base = new URL(baseUrl);
                        links.push(base.origin + link);
                    }
                }
                return [...new Set(links.slice(0, 20))]; // Limit to 20 unique links
            }

            extractEmails(html) {
                const emailRegex = /[\w\.-]+@[\w\.-]+\.\w+/gi;
                const emails = html.match(emailRegex) || [];
                return [...new Set(emails)];
            }

            extractPhones(html) {
                const phoneRegex = /(\+?[\d\s\-\$\$]{10,15})/g;
                const phones = html.match(phoneRegex) || [];
                return [...new Set(phones)];
            }

            extractForms(html) {
                const formCount = (html.match(/<form/gi) || []).length;
                return formCount;
            }

            isSameDomain(url, origin) {
                try {
                    return new URL(url).origin === origin;
                } catch {
                    return false;
                }
            }

            updateNavTree() {
                const tree = document.getElementById('navTree');
                tree.innerHTML = this.navigationHistory.map((item, index) => `
                    <div class="nav-item ${index === this.navigationHistory.length - 1 ? 'active' : ''}"
                         onclick="clawer.previewPage('${item.url}')">
                        📄 ${item.url.replace(/^https?:\/\//, '')}<br>
                        <small style="color: #666;">Depth: ${item.depth}</small>
                    </div>
                `).join('');
            }

            renderData() {
                document.getElementById('totalPages').textContent = this.visitedUrls.size;
                document.getElementById('totalData').textContent = this.extractedData.length;

                const list = document.getElementById('dataList');
                list.innerHTML = this.extractedData.slice(-50).map(item => `
                    <div class="data-item">
                        <div><strong>${item.url.replace(/^https?:\/\//, '')}</strong> 
                            <span style="color: #aaa;">(Depth: ${item.depth})</span></div>
                        ${item.title ? `<div>📄 ${item.title}</div>` : ''}
                        ${item.emails?.length ? `<div>✉️ ${item.emails.length} emails</div>` : ''}
                        ${item.phones?.length ? `<div>📞 ${item.phones.length} phones</div>` : ''}
                        ${item.links?.length ? `<div>🔗 ${item.links.length} links</div>` : ''}
                        ${item.forms ? `<div>📝 ${item.forms} forms</div>` : ''}
                        <div class="json-viewer">${JSON.stringify(item, null, 2).slice(0, 200)}...</div>
                    </div>
                `).join('') || '<div style="color: #666; text-align: center; padding: 40px;">No data extracted</div>';
            }

            updateStatus(text, state) {
                document.getElementById('statusText').textContent = text;
                const indicator = document.getElementById('statusIndicator');
                indicator.className = `status-indicator ${state}`;
            }

            showError(message) {
                this.updateStatus(message, 'error');
                setTimeout(() => this.updateStatus('Ready', 'idle'), 3000);
            }

            stopCrawling() {
                this.isCrawling = false;
                this.updateStatus('Stopped', 'idle');
            }

            clearAll() {
                this.extractedData = [];
                this.visitedUrls.clear();
                this.navigationHistory = [];
                document.getElementById('previewOverlay').style.display = 'flex';
                document.getElementById('previewFrame').style.display = 'none';
                this.renderData();
                this.updateNavTree();
                this.updateStatus('Cleared', 'idle');
            }
        }

        // Initialize
        const clawer = new WebClawer();

        // Auto-scroll data panel
        const dataList = document.getElementById('dataList');
        const observer = new MutationObserver(() => {
            dataList.scrollTop = dataList.scrollHeight;
        });
        observer.observe(dataList, { childList: true });
    </script>
</body>
</html>
