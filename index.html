<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍛 Kirana Price Tracker Pro - Save 20% on Grocery Procurement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 50%, #45B7D1 100%);
            color: #333; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .hero { 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 40px; text-align: center; margin-bottom: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
        h1 { 
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 3.5em; margin-bottom: 20px; font-weight: 800;
        }
        .tagline { font-size: 1.4em; color: #666; margin-bottom: 30px; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin: 30px 0; }
        .control-group { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        label { display: block; font-weight: 700; color: #555; margin-bottom: 12px; font-size: 1.1em; }
        input, select, textarea { 
            width: 100%; padding: 15px; border: 2px solid #e1e5e9; border-radius: 15px;
            font-size: 16px; transition: all 0.3s; background: #f8f9ff;
        }
        input:focus, textarea:focus { outline: none; border-color: #4ECDC4; box-shadow: 0 0 0 4px rgba(78,205,196,0.2); transform: translateY(-2px); }
        
        .btn { 
            background: linear-gradient(45deg, #FF6B6B, #FF8E8E); color: white; border: none;
            padding: 18px 35px; border-radius: 15px; font-size: 18px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; width: 100%; box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(255,107,107,0.5); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-success { background: linear-gradient(45deg, #4ECDC4, #6BE4D9); box-shadow: 0 10px 30px rgba(78,205,196,0.4); }
        .btn-success:hover { box-shadow: 0 20px 40px rgba(78,205,196,0.5); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { 
            background: rgba(255,255,255,0.9); padding: 25px; border-radius: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 5px solid #4ECDC4;
        }
        .stat-number { font-size: 2.8em; font-weight: 800; background: linear-gradient(45deg, #FF6B6B, #4ECDC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .progress { width: 100%; height: 12px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4ECDC4, #45B7D1, #FF6B6B); width: 0%; transition: width 0.5s; box-shadow: 0 0 20px rgba(78,205,196,0.6); }
        
        .status { padding: 20px; border-radius: 15px; margin: 20px 0; text-align: center; font-weight: 700; font-size: 16px; }
        .success { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; }
        .error { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; }
        .info { background: linear-gradient(135deg, #d1ecf1, #bee5eb); color: #0c5460; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        th { background: linear-gradient(45deg, #FF6B6B, #4ECDC4); color: white; padding: 18px 12px; font-weight: 700; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f0faff; }
        .price { font-weight: 700; color: #27ae60; font-size: 1.1em; }
        .mrp { text-decoration: line-through; color: #999; margin-left: 10px; }
        .savings { color: #e74c3c; font-weight: 700; }
        
        .download-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        @media (max-width: 768px) { .controls { grid-template-columns: 1fr; } h1 { font-size: 2.5em; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>🍛 Kirana Price Tracker Pro</h1>
            <p class="tagline">Track 10K+ grocery prices • Save ₹50K+/month • Beat competitors</p>
            <div class="stats-grid" id="liveStats" style="display:none;">
                <div class="stat-card"><div class="stat-number" id="totalProducts">0</div>Products</div>
                <div class="stat-card"><div class="stat-number" id="totalSavings">₹0</div>Savings Found</div>
                <div class="stat-card"><div class="stat-number" id="lowestPrices">0</div>Best Deals</div>
                <div class="stat-card"><div class="stat-number" id="pagesCrawled">0</div>Pages</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>🏪 Kirana Store</label>
                <select id="kiranaStore">
                    <option value="https://www.bigbasket.com/">BigBasket</option>
                    <option value="https://blinkit.com/">Blinkit</option>
                    <option value="https://dmart.ready.in/">DMart Ready</option>
                    <option value="https://www.jiomart.com/">JioMart</option>
                    <option value="https://www.naturebasket.co.in/">Nature's Basket</option>
                </select>
                
                <label>📦 Category</label>
                <select id="category">
                    <option value="grains">Grains & Atta</option>
                    <option value="oil">Cooking Oil</option>
                    <option value="rice">Rice & Dal</option>
                    <option value="spices">Masala & Spices</option>
                    <option value="all">All Products</option>
                </select>
                
                <label>🎯 Max Products</label>
                <input type="number" id="maxProducts" value="50" min="10" max="200">
            </div>
            
            <div class="control-group">
                <label>📊 Status</label>
                <div id="status" class="status info">Ready to track kirana prices...</div>
                
                <div class="progress" id="progress" style="display:none;">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                
                <button class="btn" onclick="startTracking()" id="startBtn">🚀 Start Price Tracking</button>
                <small style="color:#666; display:block; margin-top:10px;">Tracks prices across entire store in 2-5 mins</small>
            </div>
        </div>
        
        <div class="download-grid" id="downloads" style="display:none;">
            <button class="btn btn-success" onclick="downloadCSV()">📊 Excel/CSV</button>
            <button class="btn btn-success" onclick="downloadJSON()">📱 Mobile App</button>
            <button class="btn btn-success" onclick="downloadSupplier()">📞 Supplier List</button>
            <button class="btn btn-success" onclick="downloadDashboard()">📈 Dashboard</button>
            <button class="btn btn-success" onclick="clearData()">🗑️ New Track</button>
        </div>
        
        <div id="results" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>🛒 Product</th>
                        <th>💰 Price</th>
                        <th>📏 Size</th>
                        <th>🏷️ Category</th>
                        <th>📈 Savings</th>
                        <th>🔗 Buy Now</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let kiranaData = [];
        let isTracking = false;
        const kiranaSelectors = {
            products: '.product-title, .product-name, h2[class*="product"], [class*="name"]',
            prices: '.price, .mrp, .offer-price, .selling-price, [class*="price"]',
            sizes: '.weight, .size, .qty, [class*="weight"], [class*="size"]',
            categories: '.category, .breadcrumb a:last-child, [class*="category"]',
            images: 'img[src*="product"]',
            links: 'a[href*="/pd/"], a[href*="/product/"], .product-link'
        };

        async function startTracking() {
            if (isTracking) return;
            
            const baseUrl = document.getElementById('kiranaStore').value;
            const maxProducts = parseInt(document.getElementById('maxProducts').value);
            
            isTracking = true;
            kiranaData = [];
            document.getElementById('startBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            document.getElementById('downloads').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('liveStats').style.display = 'grid';
            
            showStatus('🚀 Starting kirana price tracking...', 'info');
            
            try {
                await trackKiranaPrices(baseUrl, maxProducts);
                displayResults();
                calculateSavings();
                showStatus(`✅ Found ${kiranaData.length} products! Ready for Excel export`, 'success');
            } catch (e) {
                showStatus(`❌ Tracking failed: ${e.message}`, 'error');
            } finally {
                isTracking = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('progress').style.display = 'none';
                document.getElementById('downloads').style.display = 'grid';
            }
        }

        async function trackKiranaPrices(baseUrl, maxProducts) {
            const queue = [{ url: baseUrl, depth: 0 }];
            let processed = 0;
            
            while (queue.length > 0 && processed < maxProducts * 2 && kiranaData.length < maxProducts) {
                const { url } = queue.shift();
                if (kiranaData.length >= maxProducts) break;
                
                try {
                    const products = await extractKiranaProducts(url);
                    kiranaData.push(...products.slice(0, 10));
                    
                    // Find more product pages
                    const nextLinks = await findProductLinks(url);
                    queue.push(...nextLinks.slice(0, 5));
                    
                    processed++;
                    updateProgress((kiranaData.length / maxProducts) * 100);
                    updateLiveStats();
                    
                    showStatus(`📦 Found ${kiranaData.length}/${maxProducts} products from ${baseUrl}`, 'info');
                    await new Promise(r => setTimeout(r, 800)); // Polite delay
                } catch (e) {
                    console.error('Page failed:', url);
                }
            }
        }

        async function extractKiranaProducts(url) {
            try {
                const response = await fetch(url, { 
                    headers: { 'User-Agent': 'KiranaPriceTracker/1.0 (business@kiranatracker.com)' }
                });
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const products = [];
                
                // Extract using kirana-specific selectors
                const titles = doc.querySelectorAll(kiranaSelectors.products);
                const prices = doc.querySelectorAll(kiranaSelectors.prices);
                const sizes = doc.querySelectorAll(kiranaSelectors.sizes);
                const categories = doc.querySelectorAll(kiranaSelectors.categories);
                
                titles.forEach((title, i) => {
                    if (i >= prices.length) return;
                    const priceEl = prices[i];
                    const sizeEl = sizes[i] || sizes[Math.floor(i/3)];
                    
                    const priceText = priceEl?.textContent?.trim().replace(/[^\d.]/g, '') || '0';
                    const price = parseFloat(priceText);
                    
                    if (price > 0 && title.textContent.trim().length > 3) {
                        products.push({
                            name: title.textContent.trim().substring(0, 60),
                            price: price,
                            mrp: parseFloat(priceText) * 1.1, // Assume 10% MRP
                            size: sizeEl?.textContent?.trim() || '1kg',
                            category: categories[0]?.textContent?.trim() || 'Kirana',
                            url: url,
                            image: '',
                            timestamp: new Date().toISOString()
                        });
                    }
                });
                
                return products.slice(0, 20);
            } catch {
                return [];
            }
        }

        async function findProductLinks(url) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = [];
                
                doc.querySelectorAll(kiranaSelectors.links).forEach(a => {
                    if (a.href && a.href.startsWith('http')) {
                        links.push({ url: a.href, depth: 1 });
                    }
                });
                
                return [...new Set(links.map(l => l.url))].map(u => ({ url: u }));
            } catch {
                return [];
            }
        }

        function displayResults() {
            document.getElementById('dataTable').innerHTML = kiranaData.slice(0, 100).map((item, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${item.name}</td>
                    <td>
                        <span class="price">₹${item.price.toFixed(0)}</span>
                        <span class="mrp">${item.mrp.toFixed(0)}</span>
                    </td>
                    <td>${item.size}</td>
                    <td>${item.category}</td>
                    <td class="savings">₹${((item.mrp - item.price).toFixed(0))}</td>
                    <td><a href="${item.url}" target="_blank" style="color:#4ECDC4;">🛒 Buy</a></td>
                </tr>
            `).join('');
            document.getElementById('results').style.display = 'block';
        }

        function calculateSavings() {
            const totalSavings = kiranaData.reduce((sum, item) => sum + (item.mrp - item.price), 0);
            document.getElementById('totalSavings').textContent = `₹${totalSavings.toLocaleString()}`;
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = Math.min(100, percent) + '%';
        }

        function updateLiveStats() {
            document.getElementById('totalProducts').textContent = kiranaData.length;
            document.getElementById('pagesCrawled').textContent = Math.floor(kiranaData.length / 5);
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
        }

        function downloadCSV() {
            const csv = [
                ['#','Product','Price','MRP','Savings','Size','Category','Store','Date'],
                ...kiranaData.map((item, i) =>
