<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Extractor - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="gradient-bg min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-lg px-6 py-3 rounded-full mb-6">
                <i class="fas fa-robot text-2xl text-yellow-400"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-white">AI Data Extractor</h1>
            </div>
            <p class="text-xl text-white/80 max-w-2xl mx-auto">Extract emails, phones, addresses instantly ✓ URL Fetch FIXED</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 items-start">
            <!-- Input -->
            <div class="glass rounded-3xl p-8 border border-white/20">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fas fa-file-alt text-2xl text-blue-400"></i>
                    <h2 class="text-2xl font-semibold text-white">Paste Text / URL</h2>
                </div>
                
                <div class="space-y-4 mb-6">
                    <textarea id="inputText" rows="10" 
                        placeholder="Paste any text here... OR enter URL below 👇
Examples:
- john@example.com (555) 123-4567 123 Main St
- https://example.com contact@site.com
- Copy-paste from websites/emails/PDFs"
                        class="w-full p-6 rounded-2xl bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-vertical text-lg font-mono"
                    ></textarea>
                    
                    <div class="bg-yellow-500/20 border border-yellow-400/50 p-4 rounded-xl">
                        <div class="flex items-center gap-3 mb-2">
                            <i class="fas fa-link text-yellow-400"></i>
                            <span class="font-semibold text-yellow-100">Quick URL Extract</span>
                        </div>
                        <div class="flex gap-2">
                            <input id="quickUrls" type="text" placeholder="https://twitter.com/user, https://linkedin.com/..." 
                                   class="flex-1 p-3 rounded-xl bg-white/10 text-white placeholder-white/60 border border-white/20 focus:outline-none">
                            <button onclick="quickExtract()" class="bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 text-white px-6 py-3 rounded-xl font-semibold">
                                <i class="fas fa-bolt"></i> Extract
                            </button>
                        </div>
                    </div>
                </div>
                
                <button onclick="extractData()" 
                        class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white py-5 px-8 rounded-2xl font-semibold text-lg transition-all duration-300 flex items-center justify-center gap-3 shadow-2xl hover:shadow-3xl hover:scale-[1.02]">
                    <i class="fas fa-magic text-xl"></i> AI Extract Data
                </button>
                
                <div class="mt-4 text-center text-sm text-white/60 flex items-center justify-center gap-2">
                    <kbd class="bg-white/20 px-2 py-1 rounded font-mono text-xs">Ctrl+Enter</kbd>
                    Quick extract
                </div>
            </div>

            <!-- Results -->
            <div class="glass rounded-3xl p-8 border border-white/20">
                <div class="flex items-center gap-3 mb-6">
                    <i class="fas fa-chart-bar text-2xl text-green-400"></i>
                    <h2 class="text-2xl font-semibold text-white">Extracted Data</h2>
                </div>
                
                <div id="results" class="space-y-4 min-h-[400px] text-sm"></div>
                
                <div class="mt-8 p-4 bg-white/10 rounded-xl border border-white/20 flex items-center justify-between">
                    <span class="text-white/70 text-sm">Copy results:</span>
                    <div class="flex gap-2">
                        <button onclick="copyAll()" class="text-blue-400 hover:text-blue-300 p-2 rounded-lg transition-all flex items-center gap-1">
                            <i class="fas fa-copy"></i>
                        </button>
                        <button onclick="downloadResults()" class="text-green-400 hover:text-green-300 p-2 rounded-lg transition-all flex items-center gap-1">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-4 rounded-xl shadow-2xl hidden flex items-center gap-3 z-50">
        <i class="fas fa-check"></i> Copied!
    </div>

    <script>
        const API_URL = 'https://api.openai-proxy.replit.dev/v1/chat/completions';
        
        async function extractData() {
            const input = document.getElementById('inputText').value.trim();
            if (!input) return showToast('Enter text first!');

            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Extracting...';
            btn.disabled = true;

            try {
                const prompt = `EXTRACT ONLY these from text (perfect format, no extras):

📧 **EMAILS:**
- list@example.com

📞 **PHONES:**
- (555) 123-4567

🏠 **ADDRESSES:**
- 123 Main St, City, ST 12345

👤 **NAMES:**
- John Doe

🌐 **URLS:**
- https://example.com

🐦 **SOCIALS:**
- @twitterhandle

🏢 **COMPANIES:**
- Company Name Inc

TEXT: "${input.slice(0, 4000)}"`;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer pk-free-key'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 1500,
                        temperature: 0
                    })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                displayResults(data.choices[0].message.content);
            } catch (error) {
                displayResults(`⚠️ Error - Try again!\n\n${error.message}`);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function displayResults(content) {
            document.getElementById('results').innerHTML = `
                <div class="bg-gradient-to-r from-emerald-500/20 to-blue-500/20 border-2 border-emerald-400/50 p-6 rounded-2xl backdrop-blur-sm">
                    <div class="whitespace-pre-wrap text-white/95 font-mono text-sm leading-relaxed">${content}</div>
                </div>
            `;
        }

        function quickExtract() {
            const urls = document.getElementById('quickUrls').value;
            if (urls) {
                document.getElementById('inputText').value = urls;
                extractData();
            }
        }

        function copyAll() {
            const results = document.querySelector('#results pre')?.textContent || '';
            navigator.clipboard.writeText(results).then(showToast('Copied all results!'));
        }

        function downloadResults() {
            const results = document.querySelector('#results pre')?.textContent || '';
            const blob = new Blob([results], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'extracted-data.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        // Hotkeys & Auto-resize
        document.getElementById('inputText').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 400) + 'px';
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                extractData();
            }
        });

        // Example data
        document.getElementById('inputText').value = `John Doe
john@example.com
(555) 123-4567
123 Main St, NYC 10001
https://twitter.com/johndoe
@linkedin_john
Google Inc`;
    </script>
</body>
</html>
