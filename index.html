<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupplyChain Pro - Manufacturer | Transporter | Shopkeeper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-truck"></i>
                <span>SupplyChain Pro</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#" class="nav-link active" data-page="dashboard">Dashboard</a>
                <a href="#" class="nav-link" data-page="orders">Orders</a>
                <a href="#" class="nav-link" data-page="products">Products</a>
                <a href="#" class="nav-link" data-page="track">Live Track</a>
                <a href="#" class="nav-link" data-page="profile">Profile</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <i class="fas fa-bell notification-icon" id="notificationIcon"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Login Modal -->
        <div class="modal-overlay" id="loginModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Login to SupplyChain Pro</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" id="phone" placeholder="+91 9876543210" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="role" required>
                            <option value="">Select Role</option>
                            <option value="manufacturer">Manufacturer</option>
                            <option value="transporter">Transporter</option>
                            <option value="shopkeeper">Shopkeeper</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="page active" id="dashboard">
            <div class="dashboard-header">
                <h1 id="dashboardTitle">Welcome</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-info">
                            <h3 id="totalOrders">0</h3>
                            <span>Total Orders</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-truck"></i></div>
                        <div class="stat-info">
                            <h3 id="pendingOrders">0</h3>
                            <span>Pending</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check"></i></div>
                        <div class="stat-info">
                            <h3 id="completedOrders">0</h3>
                            <span>Completed</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="dashboard-content">
                <div class="card">
                    <h3>Recent Orders</h3>
                    <div class="orders-table" id="recentOrders"></div>
                </div>
            </div>
        </div>

        <!-- Orders Page -->
        <div class="page" id="orders">
            <div class="page-header">
                <h1>Orders</h1>
                <button class="btn-primary" id="newOrderBtn">
                    <i class="fas fa-plus"></i> New Order
                </button>
            </div>
            <div class="orders-list" id="ordersList"></div>
        </div>

        <!-- Products Page -->
        <div class="page" id="products">
            <div class="page-header">
                <h1>Products</h1>
                <button class="btn-primary" id="addProductBtn">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- Live Track Page -->
        <div class="page" id="track">
            <div class="page-header">
                <h1>Live Tracking</h1>
            </div>
            <div class="map-container">
                <div id="map" style="height: 500px; width: 100%;"></div>
                <div class="track-info">
                    <div class="track-card">
                        <h4>Current Order</h4>
                        <div id="currentOrderInfo"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Page -->
        <div class="page" id="profile">
            <div class="page-header">
                <h1>Profile</h1>
            </div>
            <div class="profile-content">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3 id="profileName"></h3>
                    <p id="profilePhone"></p>
                    <p id="profileRole"></p>
                    <div class="profile-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="profileLocation"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Order Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="orderModalTitle">New Order</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="orderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Product</label>
                        <select id="orderProduct" required>
                            <option value="">Select Product</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="orderQuantity" min="1" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Shopkeeper</label>
                        <select id="orderShopkeeper" required>
                            <option value="">Select Shopkeeper</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <input type="text" id="orderAddress" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Special Instructions</label>
                    <textarea id="orderInstructions" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary">Create Order</button>
            </form>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="productModalTitle">Add Product</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="productImage">
                </div>
                <input type="hidden" id="productId">
                <button type="submit" class="btn-primary">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Notifications -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry"></script>
    <script src="script.js"></script>
</body>
</html>
