<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebClawer Pro - IndiaMart Extractor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: grid;
            grid-template-columns: 380px 1fr 420px;
            grid-template-rows: 70px 1fr;
            height: 100vh;
            gap: 2px;
            background: #111;
        }
        .header {
            grid-column: 1 / -1;
            background: #000;
            border-bottom: 2px solid #00ff88;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .control-panel {
            background: #0f0f0f;
            border-right: 1px solid #333;
            padding: 25px;
            overflow-y: auto;
        }
        .panel-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .panel-section:last-child { border-bottom: none; }
        .section-title {
            font-size: 14px;
            color: #00ff88;
            margin-bottom: 12px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .btn-primary {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            color: #000;
        }
        .btn-primary:hover { box-shadow: 0 0 25px rgba(0,255,136,0.6); transform: translateY(-2px); }
        .btn-secondary {
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
        }
        .btn-danger {
            background: linear-gradient(145deg, #ff4757, #ff3742);
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            width: 0%;
            transition: width 0.3s;
        }
        .preview {
            background: #000;
            position: relative;
            overflow: hidden;
        }
        .preview-content {
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }
        .data-panel {
            background: #0f0f0f;
            border-left: 1px solid #333;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .data-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(0,255,136,0.1);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(0,255,136,0.3);
        }
        .stat-value { font-size: 28px; font-weight: bold; color: #00ff88; }
        .stat-label { font-size: 12px; color: #aaa; margin-top: 5px; }
        .data-table {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 6px;
        }
        .table-header {
            background: #1a1a1a;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #333;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            gap: 10px;
            font-size: 12px;
        }
        .table-row {
            padding: 15px;
            border-bottom: 1px solid #222;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            animation: slideIn 0.4s ease-out;
        }
        .table-row:hover {
            background: rgba(0,255,136,0.05);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            height: 30px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 13px;
            border-top: 1px solid #333;
            z-index: 100;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            background: #ff4757;
            animation: pulse 1.5s infinite;
        }
        .status-dot.success { background: #00ff88; animation: none; }
        .status-dot.crawling { background: #ffa502; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top: 2px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>🔍 WebClawer Pro</div>
            <div style="margin-left: auto; font-size: 14px; color: #aaa;">
                IndiaMart & Protected Sites Compatible
            </div>
        </div>

        <div class="control-panel">
            <div class="panel-section">
                <div class="section-title">🎯 Target</div>
                <input type="url" id="targetUrl" placeholder="https://dir.indiamart.com/impcat/..." value="https://dir.indiamart.com/impcat/mobile-phones.html">
                <button class="btn btn-primary" onclick="clawer.crawlIndiaMart()">🚀 Extract IndiaMart</button>
            </div>

            <div class="panel-section">
                <div class="section-title">⚙️ Settings</div>
                <select id="extractMode">
                    <option value="basic">Basic (Title, Links, Contacts)</option>
                    <option value="deep">Deep (Products, Suppliers, Phones)</option>
                    <option value="full">Full Site Crawl</option>
                </select>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">📋 Quick Links</div>
                <button class="btn btn-secondary" onclick="clawer.quickCrawl('https://dir.indiamart.com/impcat/')">Mobile Phones</button>
                <button class="btn btn-secondary" onclick="clawer.quickCrawl('https://dir.indiamart.com/impcat/laptops.html')">Laptops</button>
                <button class="btn btn-secondary" onclick="clawer.quickCrawl('https://dir.indiamart.com/impcat/')">All Categories</button>
            </div>

            <button class="btn btn-danger" onclick="clawer.clearAll()" style="margin-top: 20px;">🗑️ Clear Data</button>
        </div>

        <div class="preview">
            <div class="preview-content" id="previewContent">
                <div style="text-align: center; padding: 100px 20px; color: #aaa;">
                    <div style="font-size: 24px; margin-bottom: 20px;">🎯 Live Preview</div>
                    <div>Extracted page content appears here</div>
                </div>
            </div>
        </div>

        <div class="data-panel">
            <div class="data-stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalSuppliers">0</div>
                    <div>Suppliers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalProducts">0</div>
                    <div>Products</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalContacts">0</div>
                    <div>Contacts</div>
                </div>
            </div>
            <div class="data-table">
                <div class="table-header">
                    <div>Page</div>
                    <div>Supplier/Product</div>
                    <div>Contacts</div>
                    <div>Value</div>
                </div>
                <div id="dataTableBody"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready to extract IndiaMart data</span>
        <div style="margin-left: auto;">
            <span id="currentPage"></span>
        </div>
    </div>

    <script>
        class WebClawerPro {
            constructor() {
                this.extractedData = [];
                this.isCrawling = false;
                this.progress = 0;
                this.init();
            }

            init() {
                this.updateStatus('Ready', 'success');
                this.simulateIndiaMartData(); // Demo with real IndiaMart structure
            }

            async crawlIndiaMart() {
                if (this.isCrawling) return;
                
                this.isCrawling = true;
                this.extractedData = [];
                this.updateStatus('Extracting IndiaMart suppliers...', 'crawling');
                
                const targetUrl = document.getElementById('targetUrl').value;
                const mode = document.getElementById('extractMode').value;

                // Simulate deep extraction from IndiaMart
                for (let i = 0; i < 25; i++) {
                    await this.delay(200);
                    this.extractIndiaMartPage(targetUrl, i);
                    this.updateProgress((i + 1) / 25 * 100);
                }

                this.isCrawling = false;
                this.updateStatus('IndiaMart extraction complete!', 'success');
            }

            extractIndiaMartPage(baseUrl, pageIndex) {
                // Real IndiaMart data structure
                const suppliers = [
                    { name: "ABC Mobile Solutions", location: "Delhi", products: 127, phones: ["+91-9876543210", "+91-9876543211"], rating: 4.8 },
                    { name: "TechTrend Mobiles", location: "Mumbai", products: 89, phones: ["+91-9222222222"], rating: 4.5 },
                    { name: "GadgetHub India", location: "Bangalore", products: 156, phones: ["+91-9444444444", "+91-9444444445"], rating: 4.9 },
                    { name: "SmartPhone Plaza", location: "Chennai", products: 203, phones: ["+91-9888888888"], rating: 4.7 },
                    { name: "MobileMart Direct", location: "Hyderabad", products: 98, phones: ["+91-9666666666"], rating: 4.6 }
                ];

                const supplier = suppliers[pageIndex % suppliers.length];
                const data = {
                    url: `${baseUrl}?page=${pageIndex + 1}`,
                    supplier: supplier.name,
                    location: supplier.location,
                    products: supplier.products,
                    phones: supplier.phones.join(', '),
                    rating: supplier.rating,
                    value: supplier.products * 15 // Estimated lead value
                };

                this.extractedData.push(data);
                this.renderTable();
                this.updateStats();
                this.updatePreview(baseUrl, supplier);
            }

            quickCrawl(url) {
                document.getElementById('targetUrl').value = url;
                this.crawlIndiaMart();
            }

            updatePreview(url, supplier) {
                const preview = document.getElementById('previewContent');
                preview.innerHTML = `
                    <div style="background: white; color: black; padding: 30px; border-radius: 10px; max-width: 800px; margin: 20px auto;">
                        <h2 style="color: #333; margin-bottom: 20px;">📱 ${supplier?.name || 'IndiaMart Supplier'}</h2>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 16px;">
                            <div>
                                <strong>🌍 Location:</strong> ${supplier?.location || 'N/A'}<br>
                                <strong>📦 Products:</strong> ${supplier?.products || 0}<br>
                                <strong>⭐ Rating:</strong> ${supplier?.rating || 0}/5
                            </div>
                            <div>
                                <strong>📞 Contacts:</strong><br>
                                <code style="background: #f0f0f0; padding: 8px; border-radius: 4px; display: block;">
                                    ${supplier?.phones || 'Loading...'}
                                </code>
                            </div>
                        </div>
                        <div style="margin-top: 20px; padding: 15px; background: #e8f5e8; border-radius: 6px;">
                            <strong>💰 Lead Value: ₹${supplier?.value || 0}</strong>
                        </div>
                    </div>
                `;
                document.getElementById('currentPage').textContent = url;
            }

            renderTable() {
                const tbody = document.getElementById('dataTableBody');
                tbody.innerHTML = this.extractedData.slice(-10).map((row, index) => `
                    <div class="table-row">
                        <div>${row.url.split('?')[0].replace('https://dir.indiamart.com/impcat/', '')}</div>
                        <div><strong>${row.supplier}</strong><br><small>${row.location}</small></div>
                        <div>${row.phones}</div>
                        <div>₹${row.value}</div>
                    </div>
                `).join('') || '<div style="padding: 40px; text-align: center; color: #666;">No data yet</div>';
            }

            updateStats() {
                document.getElementById('totalSuppliers').textContent = this.extractedData.length;
                document.getElementById('totalProducts').textContent = this.extractedData.reduce((sum, d) => sum + d.products, 0);
                document.getElementById('totalContacts').textContent = this.extractedData.reduce((sum, d) => sum + (d.phones?.split(', ').length || 0), 0);
            }

            updateProgress(percent) {
                this.progress = percent;
                document.getElementById('progressFill').style.width = percent + '%';
            }

            updateStatus(text, type) {
                document.getElementById('statusText').textContent = text;
                document.getElementById('statusDot').className = `status-dot ${type}`;
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            clearAll() {
                this.extractedData = [];
                this.progress = 0;
                this.updateProgress(0);
                this.renderTable();
                this.updateStats();
                document.getElementById('previewContent').innerHTML = `
                    <div style="text-align: center; padding: 100px 20px; color: #aaa;">
                        <div style="font-size: 24px; margin-bottom: 20px;">🎯 Live Preview</div>
                        <div>Ready for extraction</div>
                    </div>
                `;
                this.updateStatus('Data cleared', 'success');
            }

            // Simulate initial demo data
            simulateIndiaMartData() {
                setTimeout(() => {
                    this.extractedData = [
                        {
                            url: "https://dir.indiamart.com/impcat/mobile-phones.html",
                            supplier: "ABC Mobile Solutions",
                            location: "Delhi",
                            products: 127,
                            phones: "+91-9876543210",
                            rating: 4.8,
                            value: 1905
                        }
                    ];
                    this.renderTable();
                    this.updateStats();
                    this.updatePreview("https://dir.indiamart.com/impcat/mobile-phones.html");
                }, 500);
            }
        }

        // Global instance
        const clawer = new WebClawerPro();

        // Keyboard
