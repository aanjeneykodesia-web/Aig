<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Directory</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <style>
        #map { height: 500px; width: 100%; }
        form { max-width: 500px; margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        #coords { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <h1>Manufacturer Registration & Directory</h1>
    
    <form id="regForm">
        <input type="text" id="name" placeholder="Manufacturer Name" required>
        <input type="text" id="desc" placeholder="Description" required>
        <select id="category" required>
            <option value="">Select Category</option>
            <option value="Electronics">Electronics</option>
            <option value="Automotive">Automotive</option>
            <option value="Textiles">Textiles</option>
            <option value="Food">Food Processing</option>
        </select>
        <button type="button" id="getLoc">Detect My Location</button>
        <div id="coords">Latitude: <span id="lat">-</span> | Longitude: <span id="lng">-</span></div>
        <input type="number" id="latInput" step="any" placeholder="Latitude" required>
        <input type="number" id="lngInput" step="any" placeholder="Longitude" required>
        <button type="submit">Register</button>
    </form>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    <script>
        // Initialize map centered on India (Lucknow area)
        const map = L.map('map').setView([26.8467, 80.9462], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Category colors for icons
        const categoryColors = {
            'Electronics': '#3b82f6',
            'Automotive': '#ef4444',
            'Textiles': '#10b981',
            'Food': '#f59e0b'
        };

        let markers = L.markerClusterGroup({ spiderfyOnMaxZoom: false, showCoverageOnHover: false });
        map.addLayer(markers);
        let manufacturers = JSON.parse(localStorage.getItem('manufacturers')) || [];

        // Load existing manufacturers
        function loadMarkers() {
            markers.clearLayers();
            manufacturers.forEach((m, index) => {
                const color = categoryColors[m.category] || '#000';
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;border:2px solid white;"></div>`,
                    iconSize: [20, 20], iconAnchor: [10, 10]
                });
                const marker = L.marker([m.lat, m.lng], { icon }).bindPopup(
                    `<b>${m.name}</b><br>${m.desc}<br>Category: ${m.category}`
                );
                markers.addLayer(marker);
            });
        }
        loadMarkers();

        // Geolocation
        document.getElementById('getLoc').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('latInput').value = pos.coords.latitude;
                    document.getElementById('lngInput').value = pos.coords.longitude;
                    document.getElementById('lat').textContent = pos.coords.latitude;
                    document.getElementById('lng').textContent = pos.coords.longitude;
                    map.setView([pos.coords.latitude, pos.coords.longitude], 13);
                }, (err) => {
                    alert('Geolocation failed: ' + err.message);
                });
            } else {
                alert('Geolocation not supported');
            }
        });

        // Register
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const manufacturer = {
                name: document.getElementById('name').value,
                desc: document.getElementById('desc').value,
                category: document.getElementById('category').value,
                lat: parseFloat(document.getElementById('latInput').value),
                lng: parseFloat(document.getElementById('lngInput').value)
            };
            manufacturers.push(manufacturer);
            localStorage.setItem('manufacturers', JSON.stringify(manufacturers));
            loadMarkers();
            map.setView([manufacturer.lat, manufacturer.lng], 13);
            e.target.reset();
            document.getElementById('coords').innerHTML = 'Latitude: - | Longitude: -';
            alert('Registered successfully!');
        });
    </script>
</body>
</html>
