<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Directory</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <style>
        body { font-family: Arial, sans-serif; }
        #tabs { display: flex; margin: 20px 0; }
        #tabs button { padding: 10px 20px; background: #eee; border: none; cursor: pointer; }
        #tabs button.active { background: #007bff; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #map { height: 500px; width: 100%; }
        form { max-width: 500px; margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        #coords { font-size: 14px; color: #666; }
        #admin { padding: 20px; border: 1px solid #ccc; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .cluster-custom div { width: 25px; height: 25px; border-radius: 50%; border: 2px solid white; position: relative; display: inline-block; margin: 1px; }
        .cluster-custom .count { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 10px; color: white; text-shadow: 1px 1px 1px black; }
        .edit-btn, .del-btn { padding: 4px 8px; margin: 2px; cursor: pointer; }
        .edit-btn { background: #007bff; color: white; border: none; }
        .del-btn { background: #dc3545; color: white; border: none; }
        #adminPass { width: 200px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Manufacturer Registration & Directory</h1>
    
    <div id="tabs">
        <button class="tab-btn active" data-tab="register">Register</button>
        <button class="tab-btn" data-tab="map">Map</button>
        <button class="tab-btn" data-tab="admin">Admin</button>
    </div>

    <div id="register" class="tab-content active">
        <form id="regForm">
            <input type="text" id="name" placeholder="Manufacturer Name" required>
            <input type="text" id="desc" placeholder="Description" required>
            <select id="category">
                <option value="">Enter Custom or Select</option>
                <option value="Electronics">Electronics</option>
                <option value="Automotive">Automotive</option>
                <option value="Textiles">Textiles</option>
                <option value="Food">Food Processing</option>
            </select>
            <input type="text" id="customCat" placeholder="Custom Category (overrides select)">
            <button type="button" id="getLoc">Detect My Location</button>
            <div id="coords">Latitude: <span id="lat">-</span> | Longitude: <span id="lng">-</span></div>
            <input type="number" id="latInput" step="any" placeholder="Latitude" required>
            <input type="number" id="lngInput" step="any" placeholder="Longitude" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <div id="map" class="tab-content">
        <div id="map"></div>
    </div>

    <div id="admin" class="tab-content">
        <div>
            <input type="password" id="adminPass" placeholder="Password (admin123)">
            <button id="loginAdmin">Login</button>
        </div>
        <div id="adminContent" style="display:none;">
            <input type="text" id="search" placeholder="Search by name, category...">
            <button id="exportCSV">Export CSV</button>
            <button id="clearAll">Clear All</button>
            <table id="adminTable">
                <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Category</th><th>Lat</th><th>Lng</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    <script>
        let map, markers, manufacturers = JSON.parse(localStorage.getItem('manufacturers')) || [];
        let categoryIndex = 0;
        let adminLoggedIn = false;

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'map') loadMarkers();
            });
        });

        // Map init (lazy)
        function initMap() {
            if (map) return;
            map = L.map('map').setView([26.8467, 80.9462], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);
            markers = L.markerClusterGroup({
                spiderfyOnMaxZoom: false, showCoverageOnHover: false,
                iconCreateFunction: function(cluster) {
                    const children = cluster.getAllChildMarkers();
                    const catCounts = {};
                    let total = 0;
                    children.forEach(marker => {
                        const cat = marker.manufacturer.category;
                        catCounts[cat] = (catCounts[cat] || 0) + 1;
                        total++;
                    });
                    let html = `<div style="background:white;border-radius:8px;padding:4px;font-weight:bold;">${total}</div>`;
                    Object.entries(catCounts).forEach(([cat, count]) => {
                        const hue = (Object.keys(catCounts).indexOf(cat) * 60) % 360;
                        const color = `hsl(${hue}, 70%, 50%)`;
                        html += `<div class="cluster-custom"><div style="background:${color};" title="${cat}"><div class="count">${count}</div></div></div>`;
                    });
                    return L.divIcon({ html, className: 'custom-cluster', iconSize: L.point(60, 60) });
                }
            });
            map.addLayer(markers);
        }

        function getCategoryColor(cat) {
            return `hsl(${(categoryIndex++ * 60) % 360}, 70%, 50%)`;
        }

        function loadMarkers() {
            initMap();
            markers.clearLayers();
            manufacturers.forEach((m, id) => {
                const color = getCategoryColor(m.category);
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;border:2px solid white;"></div>`,
                    iconSize: [20, 20], iconAnchor: [10, 10]
                });
                const marker = L.marker([m.lat, m.lng], { icon });
                marker.manufacturer = m;
                marker.bindPopup(`<b>${m.name}</b><br>${m.desc}<br>Category: ${m.category}`);
                markers.addLayer(marker);
            });
        }

        // Register tab
        document.getElementById('getLoc').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('latInput').value = pos.coords.latitude;
                    document.getElementById('lngInput').value = pos.coords.longitude;
                    document.getElementById('lat').textContent = pos.coords.latitude.toFixed(4);
                    document.getElementById('lng').textContent = pos.coords.longitude.toFixed(4);
                }, (err) => alert('Geolocation failed: ' + err.message));
            } else {
                alert('Geolocation not supported');
            }
        });

        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            let category = document.getElementById('customCat').value || document.getElementById('category').value;
            if (!category) return alert('Please select or enter a category');
            const manufacturer = {
                name: document.getElementById('name').value,
                desc: document.getElementById('desc').value,
                category,
                lat: parseFloat(document.getElementById('latInput').value),
                lng: parseFloat(document.getElementById('lngInput').value)
            };
            manufacturers.push(manufacturer);
            localStorage.setItem('manufacturers', JSON.stringify(manufacturers));
            e.target.reset();
            document.getElementById('coords').innerHTML = 'Latitude: - | Longitude: -';
            alert('Registered!');
            loadMarkers();
        });

        // Admin
        document.getElementById('loginAdmin').addEventListener('click', () => {
            if (document.getElementById('adminPass').value === 'admin123') {
                adminLoggedIn = true;
                document.getElementById('adminContent').style.display = 'block';
                updateAdminTable();
            } else {
                alert('Wrong password');
            }
        });

        function updateAdminTable(filter = '') {
            const tbody = document.querySelector('#adminTable tbody');
            tbody.innerHTML = '';
            manufacturers.filter(m => 
                m.name.toLowerCase().includes(filter.toLowerCase()) ||
                m.category.toLowerCase().includes(filter.toLowerCase())
            ).forEach((m, id) => {
                const tr = tbody.insertRow();
                tr.innerHTML = `
                    <td>${id}</td>
                    <td contenteditable="true" onblur="updateManufacturer(${id}, 'name', this.textContent)">${m.name}</td>
                    <td contenteditable="true" onblur="updateManufacturer(${id}, 'desc', this.textContent)">${m.desc}</td>
                    <td contenteditable="true" onblur="updateManufacturer(${id}, 'category', this.textContent)">${m.category}</td>
                    <td contenteditable="true" onblur="updateManufacturer(${id}, 'lat', this.textContent)">${m.lat}</td>
                    <td contenteditable="true" onblur="updateManufacturer(${id}, 'lng', this.textContent)">${m.lng}</td>
                    <td><button class="del-btn" onclick="deleteManufacturer(${id})">Delete</button></td>
                `;
            });
        }

        function updateManufacturer(id, field, value) {
            if (field === 'lat' || field === 'lng') value = parseFloat(value);
            manufacturers[id][field] = value;
            localStorage.setItem('manufacturers', JSON.stringify(manufacturers));
            loadMarkers();
        }

        function deleteManufacturer(id) {
            manufacturers.splice(id, 1);
            localStorage.setItem('manufacturers', JSON.stringify(manufacturers));
            updateAdminTable(document.getElementById('search').value);
            loadMarkers();
        }

        document.getElementById('search').addEventListener('input', (e) => updateAdminTable(e.target.value));
        document.getElementById('exportCSV').addEventListener('click', () => {
            const csv = ['ID,Name,Desc,Category,Lat,Lng'].concat(manufacturers.map((m,i) => `${i},"${m.name}","${m.desc}",${m.category},${m.lat},${m.lng}`)).join('
');
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            a.download = 'manufacturers.csv';
            a.click();
        });
        document.getElementById('clearAll').addEventListener('click', () => {
            if (confirm('Clear all data?')) {
                manufacturers = [];
                localStorage.removeItem('manufacturers');
                updateAdminTable();
                loadMarkers();
            }
        });
    </script>
</body>
</html>
